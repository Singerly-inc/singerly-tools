<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: #fff;

  color: #000000;
  min-height: 100vh;
}

/* HEADER */
.header {
  background: #000000;
  padding: 0 32px;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}

.logo { display:flex; align-items:center; gap:10px; text-decoration:none; }
.logo-icon {
  width: 32px; height: 32px;
  background: #B7282E;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
}
.logo-name { font-size:1rem; font-weight:900; color:#fff; letter-spacing:0.02em; }
.logo-brand { font-size:0.6rem; color:rgba(255,255,255,0.4); letter-spacing:0.2em; }
.header-right { font-size:0.72rem; color:rgba(255,255,255,0.35); letter-spacing:0.08em; }

/* HERO */
.hero {
  background: #000000;
  padding: 56px 32px 48px;
  text-align: center;
  border-bottom: 3px solid #B7282E;
}
.hero-eyebrow {
  font-size:0.7rem; letter-spacing:0.25em; color:#B7282E;
  text-transform:uppercase; margin-bottom:12px; font-weight:600;
}
.hero-title {
  font-size:3.2rem; font-weight:900; color:#fff;
  line-height:1.05; margin-bottom:10px;
}
.hero-title .accent { color:#B7282E; }
.hero-sub { font-size:0.9rem; color:rgba(255,255,255,0.5); margin-bottom:8px; }
.hero-theory { font-size:0.68rem; color:rgba(255,255,255,0.25); margin-bottom:40px; }

.stats { display:flex; justify-content:center; gap:48px; margin-bottom:40px; }
.stat-num { font-size:2rem; font-weight:900; color:#B7282E; line-height:1; }
.stat-label { font-size:0.62rem; color:rgba(255,255,255,0.35); letter-spacing:0.1em; margin-top:4px; }

/* FILTER */
.filter-bar { display:flex; justify-content:center; gap:8px; flex-wrap:wrap; }
.filter-btn {
  padding:7px 16px; border-radius:4px;
  border:1px solid rgba(255,255,255,0.2);
  background:transparent; color:rgba(255,255,255,0.55);
  font-size:0.78rem; font-family:inherit; cursor:pointer;
  font-weight:600; transition:all 0.18s;
}
.filter-btn:hover { border-color:rgba(255,255,255,0.5); color:#fff; }
.filter-btn.active { background:#B7282E; border-color:#B7282E; color:#fff; }

.grid-section { max-width:1080px; margin:0 auto; padding:48px 32px 80px; }
.grid-meta { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:24px; }
.grid-label { font-size:0.68rem; letter-spacing:0.18em; color:#999; text-transform:uppercase; }
.tool-count { font-size:0.68rem; color:#999; }

.tool-grid {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:16px;
}
@media(max-width:900px){ .tool-grid{grid-template-columns:repeat(2,1fr);} }
@media(max-width:560px){ .tool-grid{grid-template-columns:1fr;} }

.card {

  border:1px solid #E0E0E0;
  border-radius:10px;
  padding:22px 20px 18px;

  position:relative;

.card:hover {

}
.card.coming { opacity:0.4; cursor:default; pointer-events:none; }
a.card { text-decoration:none; color:inherit; display:flex; }

.card-top { display:flex; align-items:flex-start; justify-content:space-between; gap:8px; }

.cat-tag {

.card-name { font-size:0.95rem; font-weight:800; color:#000000; line-height:1.3; }
.card-catch { font-size:0.76rem; color:#666; line-height:1.65; flex:1; }

.card-footer { display:flex; align-items:center; justify-content:space-between; margin-top:4px; }
.card-theory { font-size:0.58rem; color:#aaa; }
.btn-open {

.coming-tag {
  font-size:0.62rem; color:#bbb;
  background:#F5F5F5; border:1px solid #E0E0E0;
  border-radius:4px; padding:5px 12px;

/* FOOTER */

  border-top:1px solid #E8E8E8;
  padding:24px 32px; text-align:center;

let currentCat = 'all';

function getMudomeCount() {
  return parseInt(localStorage.getItem('mudome_count') || '0');
}
function incrementMudome() {
  localStorage.setItem('mudome_count', getMudomeCount() + 1);
}
function updateMudomeDisplay() {
  document.getElementById('mudomeCount').textContent = getMudomeCount().toLocaleString();
}

function filter(cat, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentCat = cat;
  render();
}

function render() {
  const list = currentCat === 'all' ? TOOLS : TOOLS.filter(t => t.cat === currentCat);
  document.getElementById('countLabel').textContent = list.length + ' ツール';
  document.getElementById('grid').innerHTML = list.map(t => {
    const active = t.status === 'active';
    const tag = active ? 'a' : 'div';
    const href = active ? `href="${t.path}"` : '';
    const onclick = active ? `onclick="incrementMudome()"` : '';
    return `
      <${tag} class="card ${active ? '' : 'coming'}" ${href} ${onclick}>
        <div class="card-top">
          <div class="card-icon">${t.icon}</div>
          <span class="cat-tag">${CAT_LABEL[t.cat]}</span>
        </div>
        <div class="card-name">${t.name}</div>
        <div class="card-catch">${t.catch}</div>
        <div class="card-footer">
          <div class="card-theory">${t.theory}</div>
          ${active
            ? `<span class="btn-open">開く →</span>`
            : `<span class="coming-tag">COMING SOON</span>`}
        </div>
      </${tag}>`;
  }).join('');
}

render();
updateMudomeDisplay();
</script>
</body>
</html>
