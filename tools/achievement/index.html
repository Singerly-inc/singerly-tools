<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700;900&display=swap" rel="stylesheet">
<title>達成祝福タイム — ムドメわっしょい！</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  min-height:100vh; background:#fff;
  font-family:'DM Sans','Hiragino Sans','Hiragino Kaku Gothic ProN',Arial,sans-serif;
  color:#000000; display:flex; flex-direction:column; align-items:center;
}
.nav { width:100%; padding:12px 28px; background:#000000; display:flex; align-items:center; justify-content:space-between; }
.nav-back { color:rgba(255,255,255,0.55); font-size:0.78rem; text-decoration:none; transition:color 0.15s; }
.nav-back:hover { color:#fff; }
.nav-brand { font-size:0.7rem; color:rgba(255,255,255,0.3); letter-spacing:0.15em; }
.page-header { background:#000000; width:100%; padding:28px 20px 24px; text-align:center; border-bottom:3px solid #B7282E; }
.tool-badge { display:inline-block; background:#B7282E; color:#fff; font-size:0.68rem; letter-spacing:0.15em; padding:3px 12px; border-radius:3px; margin-bottom:10px; font-weight:700; }
.page-title { font-size:1.8rem; font-weight:900; color:#fff; margin-bottom:4px; }
.page-sub { font-size:0.8rem; color:rgba(255,255,255,0.45); }

.main { width:100%; max-width:720px; padding:28px 24px 60px; display:flex; flex-direction:column; gap:20px; }

/* INPUT */
.input-area { background:#F6F6F6; border:1px solid #E0E0E0; border-radius:10px; padding:24px; }
.area-title { font-size:0.65rem; letter-spacing:0.18em; color:#888; text-transform:uppercase; margin-bottom:14px; font-weight:700; }

.field { margin-bottom:12px; }
.field label { display:block; font-size:0.75rem; font-weight:700; color:#555; margin-bottom:5px; }
.field input, .field textarea {
  width:100%; background:#fff; border:1px solid #CCCCCC; border-radius:6px;
  padding:10px 14px; color:#000000; font-size:0.9rem; font-family:inherit;
  outline:none; transition:border-color 0.15s;
}
.field input:focus, .field textarea:focus { border-color:#B7282E; }
.field input::placeholder, .field textarea::placeholder { color:#bbb; }
.field textarea { resize:vertical; min-height:72px; line-height:1.6; }

.btn-primary {
  width:100%; padding:14px; font-size:1rem; font-weight:900;
  border:none; border-radius:8px; cursor:pointer;
  background:#B7282E; color:#fff; font-family:inherit;
  transition:background 0.15s, transform 0.12s;
  letter-spacing:0.06em;
}
.btn-primary:hover { background:#83151B; transform:translateY(-1px); }

/* CELEBRATION */
.celebration { display:none; }
.celebration.show { display:block; }

.celebrate-card {
  background:#000000; border-radius:12px; padding:36px 24px;
  text-align:center; animation:popIn 0.45s ease;
}
@keyframes popIn { 0%{transform:scale(0.85);opacity:0} 65%{transform:scale(1.04)} 100%{transform:scale(1);opacity:1} }
.celebrate-emoji { font-size:3rem; margin-bottom:12px; animation:bounce 0.6s ease 0.3s; }
@keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
.celebrate-label { font-size:0.65rem; letter-spacing:0.2em; color:rgba(255,255,255,0.4); text-transform:uppercase; margin-bottom:6px; }
.celebrate-name { font-size:1.6rem; font-weight:900; color:#B7282E; margin-bottom:10px; }
.celebrate-achievement { font-size:1.1rem; font-weight:700; color:#fff; line-height:1.5; }

.next-row { display:flex; gap:10px; margin-top:12px; }
.btn-next {
  flex:1; padding:12px; font-size:0.9rem; font-weight:800;
  border:none; border-radius:8px; cursor:pointer;
  background:#B7282E; color:#fff; font-family:inherit; transition:background 0.15s;
}
.btn-next:hover { background:#83151B; }
.btn-back {
  padding:12px 20px; font-size:0.82rem; font-weight:600;
  border:1px solid rgba(255,255,255,0.2); border-radius:8px; cursor:pointer;
  background:transparent; color:rgba(255,255,255,0.55); font-family:inherit; transition:all 0.15s;
}
.btn-back:hover { background:rgba(255,255,255,0.1); color:#fff; }

/* HISTORY */
.history-area { background:#F6F6F6; border:1px solid #E0E0E0; border-radius:10px; padding:20px; display:none; }
.history-area.show { display:block; }
.history-title { font-size:0.65rem; letter-spacing:0.18em; color:#888; text-transform:uppercase; margin-bottom:14px; font-weight:700; }
.history-list { display:flex; flex-direction:column; gap:10px; }
.history-item {
  background:#fff; border:1px solid #E0E0E0; border-radius:8px; padding:12px 16px;
  display:flex; align-items:flex-start; gap:10px; animation:fadeIn 0.25s ease;
}
@keyframes fadeIn { from{opacity:0;transform:translateY(-4px)} to{opacity:1;transform:translateY(0)} }
.history-trophy { font-size:1.2rem; flex-shrink:0; margin-top:1px; }
.history-info .h-name { font-size:0.82rem; font-weight:800; color:#B7282E; }
.history-info .h-text { font-size:0.82rem; color:#000000; margin-top:2px; line-height:1.5; }

/* CONFETTI */
.confetti-container { position:fixed; inset:0; pointer-events:none; z-index:200; overflow:hidden; }
.confetti-piece { position:absolute; animation:fall linear forwards; }
@keyframes fall { 0%{transform:translateY(-20px) rotate(0deg);opacity:1} 100%{transform:translateY(100vh) rotate(720deg);opacity:0} }
</style>
</head>
<body>

<nav class="nav">
  <a class="nav-back" href="../../">← ムドメわっしょい！</a>
  <span class="nav-brand">SINGERLY</span>
</nav>

<div class="page-header">
  <div class="tool-badge">⚡ モチベーション</div>
  <h1 class="page-title">達成祝福タイム</h1>
  <p class="page-sub">小さな成功を盛大に祝う。承認し合う文化を作る。</p>
</div>

<div class="main">

  <div class="input-area" id="inputArea">
    <div class="area-title">達成を報告しよう</div>
    <div class="field">
      <label>名前</label>
      <input type="text" id="nameInput" placeholder="あなたの名前">
    </div>
    <div class="field">
      <label>達成したこと・頑張ったこと</label>
      <textarea id="achieveInput" placeholder="大きくても小さくてもOK！&#10;例：初めて1on1を全員と完了した&#10;例：毎日日報を1ヶ月続けた"></textarea>
    </div>
    <button class="btn-primary" onclick="celebrate()">🏆 祝福する！</button>
  </div>

  <div class="celebration" id="celebration">
    <div class="celebrate-card">
      <div class="celebrate-emoji">🏆</div>
      <div class="celebrate-label">達成おめでとう！</div>
      <div class="celebrate-name" id="cName"></div>
      <div class="celebrate-achievement" id="cAchieve"></div>
      <div class="next-row">
        <button class="btn-next" onclick="next()">次の人も祝福 →</button>
        <button class="btn-back" onclick="back()">入力に戻る</button>
      </div>
    </div>
  </div>

  <div class="history-area" id="historyArea">
    <div class="history-title">今日の達成一覧 🎉</div>
    <div class="history-list" id="historyList"></div>
  </div>

</div>

<div class="confetti-container" id="confetti"></div>

<script>
let history=[];

function celebrate(){
  const name=document.getElementById('nameInput').value.trim();
  const achieve=document.getElementById('achieveInput').value.trim();
  if(!name||!achieve){alert('名前と達成内容を入力してください');return;}

  history.unshift({name,achieve});

  document.getElementById('cName').textContent=name;
  document.getElementById('cAchieve').textContent=achieve;
  document.getElementById('inputArea').style.display='none';
  document.getElementById('celebration').classList.add('show');

  launchConfetti();
  renderHistory();
  document.getElementById('historyArea').classList.add('show');
}

function next(){
  document.getElementById('nameInput').value='';
  document.getElementById('achieveInput').value='';
  document.getElementById('inputArea').style.display='';
  document.getElementById('celebration').classList.remove('show');
}
function back(){ next(); }

function renderHistory(){
  document.getElementById('historyList').innerHTML=history.map(h=>`
    <div class="history-item">
      <div class="history-trophy">🏆</div>
      <div class="history-info">
        <div class="h-name">${h.name}</div>
        <div class="h-text">${h.achieve}</div>
      </div>
    </div>
  `).join('');
}

const COLORS=['#B7282E','#83151B','#000000','#D4756E','#E8A9A9','#CCCCCC'];
function launchConfetti(){
  const c=document.getElementById('confetti');
  c.innerHTML='';
  for(let i=0;i<80;i++){
    const el=document.createElement('div'); el.className='confetti-piece';
    el.style.left=Math.random()*100+'vw';
    el.style.background=COLORS[Math.floor(Math.random()*COLORS.length)];
    el.style.width=(5+Math.random()*8)+'px'; el.style.height=(5+Math.random()*8)+'px';
    el.style.borderRadius=Math.random()>0.5?'50%':'2px';
    el.style.animation=`fall ${1.4+Math.random()*2}s ${Math.random()*0.6}s ease-in forwards`;
    c.appendChild(el);
  }
  setTimeout(()=>{c.innerHTML='';},4000);
}
</script>
</body>
</html>
