<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700;900&display=swap" rel="stylesheet">
<title>匿名ボックス — ムドメわっしょい！</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { min-height:100vh; background:#fff; font-family:'DM Sans','Hiragino Sans','Hiragino Kaku Gothic ProN',Arial,sans-serif; color:#000; display:flex; flex-direction:column; align-items:center; }
.nav { width:100%; padding:12px 28px; background:#000; display:flex; align-items:center; justify-content:space-between; }
.nav-back { color:rgba(255,255,255,0.55); font-size:0.78rem; text-decoration:none; transition:color 0.15s; }
.nav-back:hover { color:#fff; }
.nav-brand { font-size:0.7rem; color:rgba(255,255,255,0.3); letter-spacing:0.15em; }
.page-header { background:#000; width:100%; padding:28px 20px 24px; text-align:center; border-bottom:3px solid #B7282E; }
.tool-badge { display:inline-block; background:#B7282E; color:#fff; font-size:0.68rem; letter-spacing:0.15em; padding:3px 12px; border-radius:3px; margin-bottom:10px; font-weight:700; }
.page-title { font-size:1.8rem; font-weight:900; color:#fff; margin-bottom:4px; }
.page-sub { font-size:0.8rem; color:rgba(255,255,255,0.45); }
.main { width:100%; max-width:680px; padding:28px 24px 60px; display:flex; flex-direction:column; gap:20px; }
.area-title { font-size:0.65rem; letter-spacing:0.18em; color:#888; text-transform:uppercase; margin-bottom:12px; font-weight:700; }
.input-panel { background:#F6F6F6; border:1px solid #E0E0E0; border-radius:10px; padding:24px; }
.cat-row { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:14px; }
.cat-btn { padding:6px 14px; border-radius:4px; border:1px solid #E0E0E0; background:#fff; cursor:pointer; font-size:0.78rem; font-weight:700; color:#555; transition:all 0.15s; font-family:inherit; }
.cat-btn:hover { border-color:#B7282E; color:#B7282E; }
.cat-btn.sel { background:#B7282E; border-color:#B7282E; color:#fff; }
.field { margin-bottom:14px; }
.field textarea { width:100%; background:#fff; border:1px solid #CCCCCC; border-radius:6px; padding:12px 14px; color:#000; font-size:0.9rem; font-family:inherit; outline:none; transition:border-color 0.15s; resize:vertical; min-height:100px; line-height:1.6; }
.field textarea:focus { border-color:#B7282E; }
.field textarea::placeholder { color:#bbb; }
.safe-note { background:#F6F6F6; border-left:3px solid #B7282E; padding:10px 14px; font-size:0.78rem; color:#555; line-height:1.5; margin-bottom:14px; border-radius:0 6px 6px 0; }
.btn-primary { width:100%; padding:13px; font-size:0.95rem; font-weight:900; border:none; border-radius:8px; cursor:pointer; background:#B7282E; color:#fff; font-family:inherit; transition:background 0.15s; }
.btn-primary:hover { background:#83151B; }
/* BOARD */
.board-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
.btn-clear { font-size:0.72rem; color:#aaa; background:none; border:none; cursor:pointer; }
.btn-clear:hover { color:#B7282E; }
.msg-list { display:flex; flex-direction:column; gap:10px; }
.msg-card { background:#fff; border:1px solid #E0E0E0; border-radius:10px; padding:16px 18px; animation:slideIn 0.3s ease; }
@keyframes slideIn { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:none} }
.mc-cat { display:inline-block; font-size:0.62rem; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; padding:2px 8px; border-radius:3px; background:#F6F6F6; color:#B7282E; margin-bottom:8px; }
.mc-text { font-size:0.95rem; color:#000; line-height:1.65; }
.mc-actions { display:flex; align-items:center; gap:8px; margin-top:10px; }
.btn-good { background:#F6F6F6; border:1px solid #E0E0E0; border-radius:5px; padding:4px 12px; font-size:0.78rem; font-weight:700; color:#555; cursor:pointer; font-family:inherit; transition:all 0.15s; }
.btn-good:hover { background:#B7282E; border-color:#B7282E; color:#fff; }
.good-count { font-size:0.72rem; color:#aaa; }
</style>
</head>
<body>
<nav class="nav"><a class="nav-back" href="../../">← ムドメわっしょい！</a><span class="nav-brand">SINGERLY</span></nav>
<div class="page-header">
  <div class="tool-badge">🛡️ 心理的安全性</div>
  <h1 class="page-title">匿名ボックス</h1>
  <p class="page-sub">言いにくいことを匿名で。モヤモヤを安全に出せる場を作る。</p>
</div>
<div class="main">
  <div class="input-panel">
    <div class="area-title">匿名でメッセージを投稿</div>
    <div class="safe-note">📌 ここに投稿した内容は名前を表示しません。安心して本音を書いてください。</div>
    <div class="field">
      <div class="cat-row" id="catRow"></div>
      <textarea id="msgIn" placeholder="チームに伝えたいこと、感じていること、提案など何でも..."></textarea>
    </div>
    <button class="btn-primary" onclick="submit()">📨 匿名で投稿する</button>
  </div>
  <div id="boardWrap" style="display:none">
    <div class="board-header">
      <div class="area-title" style="margin-bottom:0">ボックスの中身</div>
      <button class="btn-clear" onclick="clearAll()">全クリア</button>
    </div>
    <div class="msg-list" id="msgList"></div>
  </div>
</div>
<script>
const CATS=['感謝','提案・改善','困っていること','やってみたいこと','ひとこと'];
let selCat=CATS[4], entries=[];
document.getElementById('catRow').innerHTML=CATS.map(c=>
  `<button class="cat-btn ${c===selCat?'sel':''}" onclick="selectCat('${c}',this)">${c}</button>`
).join('');
function selectCat(c,el){selCat=c;document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('sel'));el.classList.add('sel');}
function submit(){
  const msg=document.getElementById('msgIn').value.trim();
  if(!msg){alert('メッセージを入力してください');return;}
  entries.unshift({cat:selCat,msg,good:0});
  document.getElementById('msgIn').value='';
  render();
  document.getElementById('boardWrap').style.display='';
}
function good(i){entries[i].good++;render();}
function render(){
  document.getElementById('msgList').innerHTML=entries.map((e,i)=>`
    <div class="msg-card">
      <div class="mc-cat">${e.cat}</div>
      <div class="mc-text">${e.msg}</div>
      <div class="mc-actions">
        <button class="btn-good" onclick="good(${i})">👍 いいね</button>
        <span class="good-count">${e.good>0?'×'+e.good:''}</span>
      </div>
    </div>`).join('');
}
function clearAll(){if(confirm('全クリアしますか？')){entries=[];document.getElementById('boardWrap').style.display='none';}}
</script>
</body>
</html>
