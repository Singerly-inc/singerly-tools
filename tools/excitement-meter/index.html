<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700;900&display=swap" rel="stylesheet">
<title>ワクワクメーター — ムドメわっしょい！</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { min-height:100vh; background:#fff; font-family:'DM Sans','Hiragino Sans','Hiragino Kaku Gothic ProN',Arial,sans-serif; color:#000000; display:flex; flex-direction:column; align-items:center; }
.nav { width:100%; padding:12px 28px; background:#000000; display:flex; align-items:center; justify-content:space-between; }
.nav-back { color:rgba(255,255,255,0.55); font-size:0.78rem; text-decoration:none; transition:color 0.15s; }
.nav-back:hover { color:#fff; }
.nav-brand { font-size:0.7rem; color:rgba(255,255,255,0.3); letter-spacing:0.15em; }
.page-header { background:#000000; width:100%; padding:28px 20px 24px; text-align:center; border-bottom:3px solid #B7282E; }
.tool-badge { display:inline-block; background:#B7282E; color:#fff; font-size:0.68rem; letter-spacing:0.15em; padding:3px 12px; border-radius:3px; margin-bottom:10px; font-weight:700; }
.page-title { font-size:1.8rem; font-weight:900; color:#fff; margin-bottom:4px; }
.page-sub { font-size:0.8rem; color:rgba(255,255,255,0.45); }

.main { width:100%; max-width:680px; padding:28px 24px 60px; display:flex; flex-direction:column; gap:20px; }
.area-title { font-size:0.65rem; letter-spacing:0.18em; color:#888; text-transform:uppercase; margin-bottom:12px; font-weight:700; }

.input-area { background:#F6F6F6; border:1px solid #E0E0E0; border-radius:10px; padding:24px; display:flex; flex-direction:column; gap:14px; }
.field label { display:block; font-size:0.75rem; font-weight:700; color:#555; margin-bottom:5px; }
.field input {
  width:100%; background:#fff; border:1px solid #CCCCCC; border-radius:6px;
  padding:10px 14px; color:#000000; font-size:0.9rem; font-family:inherit;
  outline:none; transition:border-color 0.15s;
}
.field input:focus { border-color:#B7282E; }
.field input::placeholder { color:#bbb; }

/* SLIDER */
.slider-wrap { margin-top:4px; }
.slider-value-display { text-align:center; font-size:3.5rem; font-weight:900; color:#000000; line-height:1; margin-bottom:6px; }
.slider-emoji { font-size:2rem; display:block; text-align:center; margin-bottom:12px; }
input[type=range] {
  -webkit-appearance:none; width:100%; height:8px; border-radius:4px;
  background:linear-gradient(to right,#B7282E 0%,#B7282E 50%,#EEEEEE 50%,#EEEEEE 100%);
  outline:none; cursor:pointer;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance:none; width:28px; height:28px; border-radius:50%;
  background:#000000; border:3px solid #fff; box-shadow:0 1px 4px rgba(0,0,0,0.2);
}
.slider-labels { display:flex; justify-content:space-between; font-size:0.65rem; color:#aaa; margin-top:6px; }

.btn-primary { width:100%; padding:13px; font-size:0.95rem; font-weight:900; border:none; border-radius:8px; cursor:pointer; background:#B7282E; color:#fff; font-family:inherit; transition:background 0.15s; }
.btn-primary:hover { background:#83151B; }

/* BOARD */
.board-area { display:none; }
.board-area.show { display:flex; flex-direction:column; gap:14px; }

.board-summary { background:#000000; border-radius:12px; padding:22px; text-align:center; }
.summary-label { font-size:0.62rem; letter-spacing:0.18em; color:rgba(255,255,255,0.4); text-transform:uppercase; margin-bottom:6px; }
.summary-avg { font-size:3rem; font-weight:900; color:#fff; }
.summary-sub { font-size:0.78rem; color:rgba(255,255,255,0.5); margin-top:4px; }

.entries-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:12px; }
.entry-card {
  background:#fff; border:2px solid #E0E0E0; border-radius:10px; padding:16px 14px;
  text-align:center; animation:popIn 0.3s ease both;
}
@keyframes popIn { 0%{opacity:0;transform:scale(0.88)} 70%{transform:scale(1.03)} 100%{opacity:1;transform:scale(1)} }
.entry-emoji { font-size:2rem; margin-bottom:6px; }
.entry-score { font-size:1.8rem; font-weight:900; color:#B7282E; margin-bottom:2px; }
.entry-name { font-size:0.72rem; font-weight:700; color:#555; }

.btn-row { display:flex; gap:10px; }
.btn-clear { flex:1; padding:12px; font-size:0.85rem; font-weight:700; border:2px solid #B7282E; border-radius:7px; cursor:pointer; background:#fff; color:#B7282E; font-family:inherit; transition:all 0.15s; }
.btn-clear:hover { background:#B7282E; color:#fff; }
.btn-reset { padding:12px 18px; font-size:0.82rem; font-weight:600; border:1px solid #CCCCCC; border-radius:8px; cursor:pointer; background:#fff; color:#888; font-family:inherit; }
.btn-reset:hover { background:#F6F6F6; }
</style>
<link rel="stylesheet" href="../shared.css">
</head>
<body>
<nav class="nav"><a class="nav-back" href="../../">← ムドメわっしょい！</a><span class="nav-brand">SINGERLY</span></nav>
<div class="page-header">
  <div class="tool-badge">⚡ モチベーション</div>
  <h1 class="page-title">ワクワクメーター</h1>
  <p class="page-sub">今日の仕事へのワクワク感を数値で見える化。チームの熱量を把握。</p>
</div>
<div class="main">
  <div class="input-area">
    <div class="area-title">ワクワク度を登録</div>
    <div class="field"><label>名前</label><input type="text" id="nameInput" placeholder="田中 太郎"></div>
    <div class="slider-wrap">
      <label style="font-size:0.75rem;font-weight:700;color:#555;display:block;margin-bottom:10px;">ワクワク度（1〜10）</label>
      <div class="slider-emoji" id="sliderEmoji">🙂</div>
      <div class="slider-value-display" id="sliderVal">5</div>
      <input type="range" id="slider" min="1" max="10" value="5" oninput="updateSlider(this.value)">
      <div class="slider-labels"><span>1 まったく…</span><span>10 最高！！</span></div>
    </div>
    <button class="btn-primary" onclick="submit()">登録する →</button>
  </div>

  <div class="board-area" id="boardArea">
    <div class="board-summary">
      <div class="summary-label">チーム平均ワクワク度</div>
      <div class="summary-avg" id="summaryAvg">—</div>
      <div class="summary-sub" id="summarySub">0名が回答</div>
    </div>
    <div class="entries-grid" id="entriesGrid"></div>
    <div class="btn-row">
      <button class="btn-clear" onclick="document.getElementById('nameInput').focus()">＋ 次の人</button>
      <button class="btn-reset" onclick="resetAll()">全リセット</button>
    </div>
  </div>
</div>
<script>
const EMOJIS=['😴','😑','😐','🙂','😊','😄','😁','🤩','🔥','🚀'];
let entries=[];

function updateSlider(v){
  document.getElementById('sliderVal').textContent=v;
  document.getElementById('sliderEmoji').textContent=EMOJIS[v-1];
  const pct=(v-1)/9*100;
  document.getElementById('slider').style.background=
    `linear-gradient(to right,#B7282E 0%,#B7282E ${pct}%,#EEEEEE ${pct}%,#EEEEEE 100%)`;
}
updateSlider(5);

function submit(){
  const name=document.getElementById('nameInput').value.trim();
  const score=parseInt(document.getElementById('slider').value);
  if(!name){alert('名前を入力してください');return;}
  entries.unshift({name,score});
  document.getElementById('nameInput').value='';
  document.getElementById('nameInput').focus();
  render();
  document.getElementById('boardArea').classList.add('show');
}

function render(){
  const avg=(entries.reduce((s,e)=>s+e.score,0)/entries.length).toFixed(1);
  document.getElementById('summaryAvg').textContent=avg;
  document.getElementById('summarySub').textContent=`${entries.length}名が回答`;
  document.getElementById('entriesGrid').innerHTML=entries.map((e,i)=>`
    <div class="entry-card" style="animation-delay:${i*40}ms;border-color:${e.score>=8?'#B7282E':e.score>=5?'#E0E0E0':'#EEEEEE'}">
      <div class="entry-emoji">${EMOJIS[e.score-1]}</div>
      <div class="entry-score">${e.score}</div>
      <div class="entry-name">${e.name}</div>
    </div>`).join('');
}

function resetAll(){
  if(!confirm('全データをリセットしますか？'))return;
  entries=[];
  document.getElementById('boardArea').classList.remove('show');
}
</script>
</body>
</html>
