<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700;900&display=swap" rel="stylesheet">
<title>失敗共有タイム — ムドメわっしょい！</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { min-height:100vh; background:#fff; font-family:'DM Sans','Hiragino Sans','Hiragino Kaku Gothic ProN',Arial,sans-serif; color:#000; display:flex; flex-direction:column; align-items:center; }
.nav { width:100%; padding:12px 28px; background:#000; display:flex; align-items:center; justify-content:space-between; }
.nav-back { color:rgba(255,255,255,0.55); font-size:0.78rem; text-decoration:none; transition:color 0.15s; }
.nav-back:hover { color:#fff; }
.nav-brand { font-size:0.7rem; color:rgba(255,255,255,0.3); letter-spacing:0.15em; }
.page-header { background:#000; width:100%; padding:28px 20px 24px; text-align:center; border-bottom:3px solid #B7282E; }
.tool-badge { display:inline-block; background:#B7282E; color:#fff; font-size:0.68rem; letter-spacing:0.15em; padding:3px 12px; border-radius:3px; margin-bottom:10px; font-weight:700; }
.page-title { font-size:1.8rem; font-weight:900; color:#fff; margin-bottom:4px; }
.page-sub { font-size:0.8rem; color:rgba(255,255,255,0.45); }
.main { width:100%; max-width:720px; padding:28px 24px 60px; display:flex; flex-direction:column; gap:20px; }
.area-title { font-size:0.65rem; letter-spacing:0.18em; color:#888; text-transform:uppercase; margin-bottom:12px; font-weight:700; }
.input-panel { background:#F6F6F6; border:1px solid #E0E0E0; border-radius:10px; padding:24px; }
.field { margin-bottom:14px; }
.field label { display:block; font-size:0.72rem; font-weight:700; color:#555; margin-bottom:5px; }
.field input,.field textarea { width:100%; background:#fff; border:1px solid #CCCCCC; border-radius:6px; padding:10px 14px; color:#000; font-size:0.9rem; font-family:inherit; outline:none; transition:border-color 0.15s; }
.field input:focus,.field textarea:focus { border-color:#B7282E; }
.field input::placeholder,.field textarea::placeholder { color:#bbb; }
.field textarea { resize:vertical; min-height:80px; line-height:1.6; }
.anon-toggle { display:flex; align-items:center; gap:8px; font-size:0.8rem; color:#555; cursor:pointer; margin-bottom:14px; }
.anon-toggle input[type=checkbox] { accent-color:#B7282E; width:15px; height:15px; }
.btn-primary { width:100%; padding:13px; font-size:0.95rem; font-weight:900; border:none; border-radius:8px; cursor:pointer; background:#B7282E; color:#fff; font-family:inherit; transition:background 0.15s; }
.btn-primary:hover { background:#83151B; }
/* BOARD */
.board-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
.btn-clear { font-size:0.72rem; color:#aaa; background:none; border:none; cursor:pointer; }
.btn-clear:hover { color:#B7282E; }
.cards { display:flex; flex-direction:column; gap:14px; }
.fail-card { background:#fff; border:2px solid #E0E0E0; border-radius:12px; padding:20px; animation:popIn 0.35s ease both; }
@keyframes popIn { 0%{opacity:0;transform:scale(0.92)} 100%{opacity:1;transform:none} }
.fc-header { display:flex; align-items:center; gap:10px; margin-bottom:12px; }
.fc-emoji { font-size:1.4rem; }
.fc-name { font-size:0.72rem; font-weight:700; color:#B7282E; text-transform:uppercase; letter-spacing:0.08em; }
.fc-fail { font-size:0.95rem; color:#000; line-height:1.65; margin-bottom:12px; font-weight:600; }
.fc-learn { background:#F6F6F6; border-radius:6px; padding:10px 14px; }
.fc-learn-label { font-size:0.62rem; font-weight:700; color:#888; text-transform:uppercase; letter-spacing:0.1em; margin-bottom:4px; }
.fc-learn-text { font-size:0.88rem; color:#555; line-height:1.55; }
.react-row { display:flex; align-items:center; gap:8px; margin-top:12px; border-top:1px solid #F0F0F0; padding-top:10px; }
.btn-react { background:#F6F6F6; border:1px solid #E0E0E0; border-radius:5px; padding:4px 12px; font-size:0.82rem; font-weight:700; color:#555; cursor:pointer; font-family:inherit; transition:all 0.15s; }
.btn-react:hover { background:#B7282E; border-color:#B7282E; color:#fff; }
.react-count { font-size:0.72rem; color:#aaa; }
</style>
<link rel="stylesheet" href="../shared.css">
</head>
<body>
<nav class="nav"><a class="nav-back" href="../../">← ムドメわっしょい！</a><span class="nav-brand">SINGERLY</span></nav>
<div class="page-header">
  <div class="tool-badge">🛡️ 心理的安全性</div>
  <h1 class="page-title">失敗共有タイム</h1>
  <p class="page-sub">失敗を笑いと学びに変える。チームの安全基地が育つ。</p>
</div>
<div class="main">
  <div class="input-panel">
    <div class="area-title">失敗談を投稿する</div>
    <label class="anon-toggle"><input type="checkbox" id="anonCheck"> 匿名で投稿する</label>
    <div class="field"><label>名前</label><input type="text" id="nameIn" placeholder="田中 太郎（匿名の場合は不要）"></div>
    <div class="field"><label>やらかした失敗…</label><textarea id="failIn" placeholder="プレゼン当日に資料を会社に忘れてきた。しかも大事なクライアントの前で。"></textarea></div>
    <div class="field"><label>そこから得た学び</label><textarea id="learnIn" placeholder="前日に必ずチェックリストで確認するようにした。以来ミスゼロ！"></textarea></div>
    <button class="btn-primary" onclick="submit()">失敗を共有する 🙏</button>
  </div>
  <div id="boardWrap" style="display:none">
    <div class="board-header">
      <div class="area-title" style="margin-bottom:0">失敗共有ボード</div>
      <button class="btn-clear" onclick="clearAll()">全クリア</button>
    </div>
    <div class="cards" id="cards"></div>
  </div>
</div>
<script>
const EMOJIS=['😅','😂','🙈','💦','🫠','😭','🤦'];
let entries=[];
function submit(){
  const anon=document.getElementById('anonCheck').checked;
  const name=anon?'匿名':document.getElementById('nameIn').value.trim();
  const fail=document.getElementById('failIn').value.trim();
  const learn=document.getElementById('learnIn').value.trim();
  if(!fail){alert('失敗談を入力してください');return;}
  entries.unshift({name:name||'匿名',fail,learn,react:0,emoji:EMOJIS[Math.floor(Math.random()*EMOJIS.length)]});
  ['nameIn','failIn','learnIn'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('anonCheck').checked=false;
  render();
  document.getElementById('boardWrap').style.display='';
}
function react(i){entries[i].react++;render();}
function render(){
  document.getElementById('cards').innerHTML=entries.map((e,i)=>`
    <div class="fail-card" style="animation-delay:${i*40}ms">
      <div class="fc-header"><div class="fc-emoji">${e.emoji}</div><div class="fc-name">${e.name}</div></div>
      <div class="fc-fail">${e.fail}</div>
      ${e.learn?`<div class="fc-learn"><div class="fc-learn-label">💡 学び</div><div class="fc-learn-text">${e.learn}</div></div>`:''}
      <div class="react-row">
        <button class="btn-react" onclick="react(${i})">わかる〜！</button>
        <span class="react-count">${e.react>0?'×'+e.react+'人が共感':''}</span>
      </div>
    </div>`).join('');
}
function clearAll(){if(confirm('全クリアしますか？')){entries=[];document.getElementById('boardWrap').style.display='none';}}
</script>
</body>
</html>
