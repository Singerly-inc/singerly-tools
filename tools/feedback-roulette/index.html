<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700;900&display=swap" rel="stylesheet">
<title>フィードバックルーレット — ムドメわっしょい！</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { min-height:100vh; background:#fff; font-family:'DM Sans','Hiragino Sans','Hiragino Kaku Gothic ProN',Arial,sans-serif; color:#000; display:flex; flex-direction:column; align-items:center; }
.nav { width:100%; padding:12px 28px; background:#000; display:flex; align-items:center; justify-content:space-between; }
.nav-back { color:rgba(255,255,255,0.55); font-size:0.78rem; text-decoration:none; transition:color 0.15s; }
.nav-back:hover { color:#fff; }
.nav-brand { font-size:0.7rem; color:rgba(255,255,255,0.3); letter-spacing:0.15em; }
.page-header { background:#000; width:100%; padding:28px 20px 24px; text-align:center; border-bottom:3px solid #B7282E; }
.tool-badge { display:inline-block; background:#B7282E; color:#fff; font-size:0.68rem; letter-spacing:0.15em; padding:3px 12px; border-radius:3px; margin-bottom:10px; font-weight:700; }
.page-title { font-size:1.8rem; font-weight:900; color:#fff; margin-bottom:4px; }
.page-sub { font-size:0.8rem; color:rgba(255,255,255,0.45); }
.main { width:100%; max-width:720px; padding:28px 24px 60px; display:flex; flex-direction:column; gap:20px; }
.area-title { font-size:0.65rem; letter-spacing:0.18em; color:#888; text-transform:uppercase; margin-bottom:12px; font-weight:700; }
.intro-card { background:#F6F6F6; border:1px solid #E0E0E0; border-radius:10px; padding:20px; font-size:0.88rem; color:#555; line-height:1.7; }
.intro-card strong { color:#B7282E; }
.setup-card { background:#F6F6F6; border:1px solid #E0E0E0; border-radius:12px; padding:24px; }
.field { margin-bottom:14px; }
.field label { display:block; font-size:0.72rem; font-weight:700; color:#555; margin-bottom:5px; }
.field textarea { width:100%; background:#fff; border:1px solid #CCCCCC; border-radius:6px; padding:10px 14px; color:#000; font-size:0.9rem; font-family:inherit; outline:none; transition:border-color 0.15s; resize:vertical; min-height:100px; line-height:1.6; }
.field textarea:focus { border-color:#B7282E; }
.field textarea::placeholder { color:#bbb; }
.type-btns { display:flex; gap:8px; flex-wrap:wrap; }
.type-btn { padding:7px 14px; border-radius:5px; border:2px solid #E0E0E0; background:#fff; cursor:pointer; font-size:0.78rem; font-weight:700; color:#555; transition:all 0.15s; font-family:inherit; }
.type-btn:hover,.type-btn.sel { border-color:#B7282E; background:#B7282E; color:#fff; }
.btn-primary { width:100%; padding:13px; font-size:0.95rem; font-weight:900; border:none; border-radius:8px; cursor:pointer; background:#B7282E; color:#fff; font-family:inherit; transition:background 0.15s; }
.btn-primary:hover { background:#83151B; }
/* Session */
.session-area { display:none; }
.session-area.show { display:flex; flex-direction:column; gap:16px; }
.pair-card { background:#000; border-radius:14px; padding:28px; text-align:center; }
.pc-label { font-size:0.62rem; letter-spacing:0.18em; color:#B7282E; text-transform:uppercase; font-weight:700; margin-bottom:16px; }
.pc-pair { font-size:1.3rem; font-weight:900; color:#fff; margin-bottom:8px; }
.pc-arrow { font-size:1rem; color:rgba(255,255,255,0.3); margin-bottom:8px; }
.pc-prompt { font-size:0.95rem; color:rgba(255,255,255,0.7); line-height:1.6; }
.timer-row { display:flex; align-items:center; gap:10px; justify-content:center; margin-top:12px; }
.timer-display { font-size:1.5rem; font-weight:900; color:#B7282E; }
.btn-timer { padding:8px 18px; font-size:0.82rem; font-weight:700; border:2px solid #B7282E; border-radius:6px; cursor:pointer; background:transparent; color:#B7282E; font-family:inherit; transition:all 0.15s; }
.btn-timer:hover { background:#B7282E; color:#fff; }
.btn-row { display:flex; gap:10px; }
.btn-next { flex:2; padding:13px; font-size:0.95rem; font-weight:900; border:none; border-radius:8px; cursor:pointer; background:#B7282E; color:#fff; font-family:inherit; }
.btn-next:hover { background:#83151B; }
.btn-skip { flex:1; padding:13px; font-size:0.85rem; font-weight:700; border:1px solid #CCCCCC; border-radius:8px; cursor:pointer; background:#fff; color:#888; font-family:inherit; }
.progress-row { display:flex; gap:4px; justify-content:center; flex-wrap:wrap; }
.prog-dot { width:8px; height:8px; border-radius:50%; background:#EEEEEE; transition:background 0.3s; }
.prog-dot.done { background:#22a06b; }
.prog-dot.active { background:#B7282E; }
.complete-card { background:#000; border-radius:14px; padding:36px 28px; text-align:center; }
.cc-emoji { font-size:3rem; margin-bottom:12px; }
.cc-title { font-size:1.4rem; font-weight:900; color:#fff; margin-bottom:8px; }
.cc-msg { font-size:0.88rem; color:rgba(255,255,255,0.55); line-height:1.6; }
.btn-retry { margin-top:18px; padding:12px 28px; border:2px solid #B7282E; border-radius:8px; background:transparent; color:#B7282E; font-family:inherit; font-size:0.88rem; font-weight:700; cursor:pointer; }
.btn-retry:hover { background:#B7282E; color:#fff; }
</style>
</head>
<body>
<nav class="nav"><a class="nav-back" href="../../">← ムドメわっしょい！</a><span class="nav-brand">SINGERLY</span></nav>
<div class="page-header">
  <div class="tool-badge">🎯 対話・意思決定</div>
  <h1 class="page-title">フィードバックルーレット</h1>
  <p class="page-sub">ランダムなペアでフィードバックを交換。チーム全体の対話を増やす。</p>
</div>
<div class="main">
  <div class="intro-card">💡 <strong>フィードバックは文化</strong>です。ランダムなペアで定期的にフィードバックを交わす習慣が、チームの成長速度を高めます。
  </div>
  <div class="setup-card" id="setupCard">
    <div class="area-title">参加者と設定</div>
    <div class="field">
      <label>参加者（1行1名、偶数人推奨）</label>
      <textarea id="membersIn" placeholder="田中 太郎&#10;山田 花子&#10;鈴木 一郎&#10;佐藤 二郎"></textarea>
    </div>
    <div class="field">
      <label>フィードバックの種類</label>
      <div class="type-btns" id="typeBtns"></div>
    </div>
    <button class="btn-primary" onclick="startSession()">ルーレットを始める 🎲</button>
  </div>
  <div class="session-area" id="sessionArea">
    <div class="progress-row" id="progressRow"></div>
    <div class="pair-card" id="pairCard"></div>
    <div class="btn-row">
      <button class="btn-next" onclick="nextPair()">次のペア →</button>
      <button class="btn-skip" onclick="nextPair()">スキップ</button>
    </div>
  </div>
  <div class="complete-card" id="completeCard" style="display:none">
    <div class="cc-emoji">🎉</div>
    <div class="cc-title">全ペア完了！</div>
    <div class="cc-msg">全員がフィードバックを交わしました。<br>お互いの成長のために継続しましょう！</div>
    <button class="btn-retry" onclick="restart()">🔁 もう一度</button>
  </div>
</div>
<script>
const FB_TYPES={
  'ポジティブ': ['〇〇さんが最近チームに貢献していると感じる場面を教えてください','〇〇さんの強みだと思うことを伝えましょう','最近〇〇さんに「ありがとう」と言いたいことは？'],
  '成長支援': ['〇〇さんがさらに活躍するために1つアドバイスするとしたら？','〇〇さんに挑戦してほしいことを伝えましょう','〇〇さんがもっと発揮できると思う強みは？'],
  '相互理解': ['〇〇さんに聞いてみたかったことを質問しましょう','〇〇さんの仕事スタイルで気になることを聞いてみよう','〇〇さんとより良く働くために自分が変えられることは？'],
  'ポジティブ＋成長':['〇〇さんへのありがとうと改善提案の両方を伝えましょう','Keep（続けてほしいこと）とTry（試してほしいこと）を伝えましょう','〇〇さんへのスターフィードバック（Star/Wish）をしましょう'],
};
let selType='ポジティブ',members=[],pairs=[],cur=0,timerInt=null;
document.getElementById('typeBtns').innerHTML=Object.keys(FB_TYPES).map(t=>
  `<button class="type-btn ${t===selType?'sel':''}" onclick="selectType('${t}',this)">${t}</button>`
).join('');
function selectType(t,el){selType=t;document.querySelectorAll('.type-btn').forEach(b=>b.classList.remove('sel'));el.classList.add('sel');}
function shuffle(arr){for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}return arr;}
function makePairs(members){
  const shuffled=shuffle([...members]);
  const ps=[];
  for(let i=0;i<shuffled.length-1;i+=2){ps.push([shuffled[i],shuffled[i+1]]);}
  if(shuffled.length%2===1)ps.push([shuffled[shuffled.length-1],'（フリー）']);
  return ps;
}
function startSession(){
  members=document.getElementById('membersIn').value.split('\n').map(s=>s.trim()).filter(Boolean);
  if(members.length<2){alert('参加者を2名以上入力してください');return;}
  pairs=makePairs(members);cur=0;
  document.getElementById('setupCard').style.display='none';
  document.getElementById('sessionArea').classList.add('show');
  renderPair();
}
function renderPair(){
  if(cur>=pairs.length){document.getElementById('sessionArea').classList.remove('show');document.getElementById('completeCard').style.display='';return;}
  const [a,b]=pairs[cur];
  const prompts=FB_TYPES[selType];
  const prompt=prompts[Math.floor(Math.random()*prompts.length)];
  document.getElementById('pairCard').innerHTML=`
    <div class="pc-label">ペア ${cur+1} / ${pairs.length}</div>
    <div class="pc-pair">${a}  ⇄  ${b}</div>
    <div class="pc-prompt" style="margin-top:16px">${prompt.replace('〇〇さん',a)} ${b!=='（フリー）'?'<br>逆も同様に':''}  </div>
    <div class="timer-row">
      <button class="btn-timer" onclick="startTimer()">⏱ 3分タイマー</button>
      <div class="timer-display" id="timerDisp"></div>
    </div>`;
  document.getElementById('progressRow').innerHTML=pairs.map((_,i)=>`<div class="prog-dot ${i<cur?'done':i===cur?'active':''}"></div>`).join('');
}
function nextPair(){clearTimer();cur++;renderPair();}
function startTimer(){
  clearTimer();
  let sec=180;
  function tick(){
    const m=Math.floor(sec/60),s=sec%60;
    const el=document.getElementById('timerDisp');
    if(el)el.textContent=`${m}:${String(s).padStart(2,'0')}`;
    if(sec===0){clearTimer();if(el)el.textContent='時間！';return;}
    sec--;
  }
  tick();timerInt=setInterval(tick,1000);
}
function clearTimer(){if(timerInt){clearInterval(timerInt);timerInt=null;}const el=document.getElementById('timerDisp');if(el)el.textContent='';}
function restart(){
  document.getElementById('completeCard').style.display='none';
  document.getElementById('setupCard').style.display='';
  document.getElementById('membersIn').value='';
}
</script>
</body>
</html>
