<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700;900&display=swap" rel="stylesheet">
<title>理念クイズ — ムドメわっしょい！</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { min-height:100vh; background:#fff; font-family:'DM Sans','Hiragino Sans','Hiragino Kaku Gothic ProN',Arial,sans-serif; color:#000000; display:flex; flex-direction:column; align-items:center; }
.nav { width:100%; padding:12px 28px; background:#000000; display:flex; align-items:center; justify-content:space-between; }
.nav-back { color:rgba(255,255,255,0.55); font-size:0.78rem; text-decoration:none; transition:color 0.15s; }
.nav-back:hover { color:#fff; }
.nav-brand { font-size:0.7rem; color:rgba(255,255,255,0.3); letter-spacing:0.15em; }
.page-header { background:#000000; width:100%; padding:28px 20px 24px; text-align:center; border-bottom:3px solid #B7282E; }
.tool-badge { display:inline-block; background:#B7282E; color:#fff; font-size:0.68rem; letter-spacing:0.15em; padding:3px 12px; border-radius:3px; margin-bottom:10px; font-weight:700; }
.page-title { font-size:1.8rem; font-weight:900; color:#fff; margin-bottom:4px; }
.page-sub { font-size:0.8rem; color:rgba(255,255,255,0.45); }

.main { width:100%; max-width:680px; padding:28px 24px 60px; display:flex; flex-direction:column; gap:20px; }
.area-title { font-size:0.65rem; letter-spacing:0.18em; color:#888; text-transform:uppercase; margin-bottom:12px; font-weight:700; }

/* SETUP */
.setup-area { background:#F6F6F6; border:1px solid #E0E0E0; border-radius:10px; padding:22px; }
.quiz-item { background:#fff; border:1px solid #E0E0E0; border-radius:8px; padding:14px; margin-bottom:10px; display:flex; flex-direction:column; gap:8px; }
.qi-row { display:flex; gap:8px; align-items:center; }
.qi-label { font-size:0.65rem; font-weight:700; color:#888; width:60px; flex-shrink:0; text-transform:uppercase; }
.qi-input {
  flex:1; background:#F6F6F6; border:1px solid #E0E0E0; border-radius:5px;
  padding:7px 10px; color:#000000; font-size:0.85rem; font-family:inherit; outline:none; transition:border-color 0.15s;
}
.qi-input:focus { border-color:#B7282E; }
.qi-input::placeholder { color:#ccc; }
.qi-options { display:grid; grid-template-columns:1fr 1fr; gap:6px; }
.qi-opt-row { display:flex; gap:6px; align-items:center; }
.qi-opt-check { accent-color:#B7282E; width:14px; height:14px; cursor:pointer; }
.qi-opt-input {
  flex:1; background:#F6F6F6; border:1px solid #E0E0E0; border-radius:5px;
  padding:6px 8px; color:#000000; font-size:0.82rem; font-family:inherit; outline:none;
}
.qi-opt-input:focus { border-color:#B7282E; }
.qi-opt-input::placeholder { color:#ccc; }
.btn-del-q { background:none; border:none; font-size:1rem; cursor:pointer; color:#ccc; padding:2px 4px; }
.btn-del-q:hover { color:#e05; }

.btn-add-q { background:none; border:1px dashed #CCCCCC; border-radius:6px; padding:9px; font-size:0.82rem; color:#aaa; cursor:pointer; width:100%; margin-bottom:14px; transition:all 0.15s; }
.btn-add-q:hover { border-color:#B7282E; color:#B7282E; }

.btn-primary { width:100%; padding:13px; font-size:0.95rem; font-weight:900; border:none; border-radius:8px; cursor:pointer; background:#B7282E; color:#fff; font-family:inherit; transition:background 0.15s; }
.btn-primary:hover { background:#83151B; }

/* QUIZ */
.quiz-area { display:none; }
.quiz-area.show { display:flex; flex-direction:column; gap:16px; }

.q-progress { font-size:0.72rem; color:#888; display:flex; justify-content:space-between; margin-bottom:4px; }
.progress-bar-wrap { background:#EEEEEE; border-radius:4px; height:6px; overflow:hidden; }
.progress-bar-fill { height:100%; background:#B7282E; border-radius:4px; transition:width 0.4s ease; }

.q-card { background:#F6F6F6; border:1px solid #E0E0E0; border-radius:12px; padding:28px 22px; }
.q-num { font-size:0.65rem; color:#aaa; margin-bottom:10px; }
.q-text { font-size:1.1rem; font-weight:800; color:#000000; line-height:1.5; margin-bottom:24px; }
.choices { display:flex; flex-direction:column; gap:10px; }
.choice-btn {
  padding:14px 18px; border-radius:8px; border:2px solid #E0E0E0;
  background:#fff; cursor:pointer; font-family:inherit; font-size:0.9rem; font-weight:600;
  color:#000000; text-align:left; transition:all 0.18s;
}
.choice-btn:hover { border-color:#B7282E; background:#FDF3F3; }
.choice-btn.correct { border-color:#1A9E6A; background:#E8F5F0; color:#0D4A3A; }
.choice-btn.wrong { border-color:#ccc; background:#f5f5f5; color:#aaa; }
.choice-btn.answer { border-color:#1A9E6A; background:#E8F5F0; color:#0D4A3A; font-weight:900; }

.feedback { padding:14px; border-radius:8px; font-size:0.9rem; font-weight:700; text-align:center; }
.feedback.ok { background:#E8F5F0; color:#0D4A3A; }
.feedback.ng { background:#FFF0F0; color:#7A1A1A; }

.btn-next-q { width:100%; padding:12px; font-size:0.9rem; font-weight:800; border:none; border-radius:8px; cursor:pointer; background:#B7282E; color:#fff; font-family:inherit; transition:background 0.15s; }
.btn-next-q:hover { background:#83151B; }

/* RESULT */
.result-area { display:none; }
.result-area.show { display:flex; flex-direction:column; gap:14px; }
.result-card { background:#000000; border-radius:14px; padding:30px 24px; text-align:center; }
.rc-label { font-size:0.65rem; letter-spacing:0.18em; color:rgba(255,255,255,0.4); text-transform:uppercase; margin-bottom:8px; }
.rc-score { font-size:4rem; font-weight:900; color:#fff; }
.rc-max { font-size:1rem; color:rgba(255,255,255,0.4); }
.rc-msg { font-size:0.88rem; color:rgba(255,255,255,0.65); margin-top:10px; line-height:1.5; }
.btn-retry { width:100%; padding:12px; font-size:0.9rem; font-weight:800; border:2px solid #B7282E; border-radius:8px; cursor:pointer; background:#fff; color:#B7282E; font-family:inherit; transition:all 0.15s; }
.btn-retry:hover { background:#B7282E; color:#fff; }
.btn-edit { width:100%; padding:12px; font-size:0.88rem; font-weight:600; border:1px solid #CCCCCC; border-radius:8px; cursor:pointer; background:#fff; color:#888; font-family:inherit; }
.btn-edit:hover { background:#F6F6F6; }
</style>
<link rel="stylesheet" href="../shared.css">
</head>
<body>
<nav class="nav"><a class="nav-back" href="../../">← ムドメわっしょい！</a><span class="nav-brand">SINGERLY</span></nav>
<div class="page-header">
  <div class="tool-badge">🧩 理念・文化</div>
  <h1 class="page-title">理念クイズ</h1>
  <p class="page-sub">会社の理念・価値観をクイズで楽しく浸透させる。</p>
</div>
<div class="main">
  <div class="setup-area" id="setupArea">
    <div class="area-title">クイズを作成</div>
    <div id="quizItems"></div>
    <button class="btn-add-q" onclick="addQ()">＋ 問題を追加</button>
    <button class="btn-primary" onclick="startQuiz()">▶ クイズスタート！</button>
  </div>

  <div class="quiz-area" id="quizArea">
    <div>
      <div class="q-progress"><span id="qProg">1 / 3</span><span id="qScore">0 正解</span></div>
      <div class="progress-bar-wrap"><div class="progress-bar-fill" id="qProgFill" style="width:0%"></div></div>
    </div>
    <div class="q-card">
      <div class="q-num" id="qNum"></div>
      <div class="q-text" id="qTextDisp"></div>
      <div class="choices" id="choicesDisp"></div>
      <div class="feedback" id="feedback" style="display:none"></div>
    </div>
    <button class="btn-next-q" id="btnNextQ" onclick="nextQ()" style="display:none">次の問題 →</button>
  </div>

  <div class="result-area" id="resultArea">
    <div class="result-card">
      <div class="rc-label">スコア</div>
      <div><span class="rc-score" id="rcScore">0</span><span class="rc-max" id="rcMax"> / 3</span></div>
      <div class="rc-msg" id="rcMsg"></div>
    </div>
    <button class="btn-retry" onclick="retry()">🔁 もう一度チャレンジ</button>
    <button class="btn-edit" onclick="backToEdit()">← クイズを編集する</button>
  </div>
</div>
<script>
let qs=[
  {q:'当社のミッションは何ですか？',opts:['利益を最大化する','世界をより良くする','社員を幸せにする','顧客に最高の体験を'],ans:0},
  {q:'当社が最も大切にしている価値観（バリュー）は？',opts:['スピード','誠実さ','コスト削減','規模拡大'],ans:1},
  {q:'当社のビジョンとして正しいものは？',opts:['業界シェア1位','10年で上場','はたらいて泣こう','AI企業になる'],ans:2},
];
let currentQ=0,score=0,answered=false;

function renderSetup(){
  document.getElementById('quizItems').innerHTML=qs.map((q,i)=>`
    <div class="quiz-item">
      <div class="qi-row">
        <div class="qi-label">Q${i+1}</div>
        <input class="qi-input" placeholder="問題文" value="${q.q}" oninput="qs[${i}].q=this.value">
        <button class="btn-del-q" onclick="removeQ(${i})">✕</button>
      </div>
      <div class="qi-options">
        ${q.opts.map((o,j)=>`
          <div class="qi-opt-row">
            <input type="radio" class="qi-opt-check" name="ans${i}" ${q.ans===j?'checked':''} onchange="qs[${i}].ans=${j}">
            <input class="qi-opt-input" placeholder="選択肢${j+1}" value="${o}" oninput="qs[${i}].opts[${j}]=this.value">
          </div>`).join('')}
      </div>
    </div>`).join('');
}

function addQ(){
  qs.push({q:'',opts:['','','',''],ans:0});
  renderSetup();
}
function removeQ(i){
  if(qs.length<=1)return;
  qs.splice(i,1);
  renderSetup();
}

function startQuiz(){
  const valid=qs.filter(q=>q.q.trim()&&q.opts.filter(o=>o.trim()).length>=2);
  if(!valid.length){alert('問題を正しく入力してください（選択肢2つ以上）');return;}
  qs=valid;
  currentQ=0;score=0;
  document.getElementById('setupArea').style.display='none';
  document.getElementById('quizArea').classList.add('show');
  renderQ();
}

function renderQ(){
  const q=qs[currentQ];
  answered=false;
  document.getElementById('qProg').textContent=`${currentQ+1} / ${qs.length}`;
  document.getElementById('qScore').textContent=`${score} 正解`;
  document.getElementById('qProgFill').style.width=`${currentQ/qs.length*100}%`;
  document.getElementById('qNum').textContent=`Q${currentQ+1}`;
  document.getElementById('qTextDisp').textContent=q.q;
  document.getElementById('feedback').style.display='none';
  document.getElementById('btnNextQ').style.display='none';
  const valid=q.opts.map((o,i)=>({o,i})).filter(x=>x.o.trim());
  document.getElementById('choicesDisp').innerHTML=valid.map(x=>`
    <button class="choice-btn" onclick="answer(${x.i},this)">${x.o}</button>`).join('');
}

function answer(idx,el){
  if(answered)return;
  answered=true;
  const q=qs[currentQ];
  const isCorrect=idx===q.ans;
  if(isCorrect)score++;
  document.querySelectorAll('.choice-btn').forEach(b=>b.disabled=true);
  el.classList.add(isCorrect?'correct':'wrong');
  document.querySelectorAll('.choice-btn').forEach((b,bi)=>{
    const optIdx=parseInt(b.getAttribute('onclick').match(/\d+/)[0]);
    if(optIdx===q.ans)b.classList.add('answer');
  });
  const fb=document.getElementById('feedback');
  fb.style.display='block';
  fb.className='feedback '+(isCorrect?'ok':'ng');
  fb.textContent=isCorrect?'✅ 正解！':'❌ 不正解… 正しい答えを確認しましょう。';
  document.getElementById('btnNextQ').style.display='block';
  document.getElementById('btnNextQ').textContent=currentQ+1<qs.length?'次の問題 →':'結果を見る';
}

function nextQ(){
  currentQ++;
  if(currentQ>=qs.length){showResult();return;}
  renderQ();
}

function showResult(){
  document.getElementById('quizArea').classList.remove('show');
  document.getElementById('resultArea').classList.add('show');
  document.getElementById('rcScore').textContent=score;
  document.getElementById('rcMax').textContent=` / ${qs.length}`;
  const pct=score/qs.length;
  document.getElementById('rcMsg').textContent=
    pct===1?'パーフェクト！理念を完璧に理解しています！':
    pct>=0.7?'よくできました！さらに深めましょう。':
    pct>=0.5?'もう少し！理念を一緒に振り返りましょう。':
    '一緒に理念を学び直しましょう！';
}

function retry(){ currentQ=0;score=0; document.getElementById('resultArea').classList.remove('show'); document.getElementById('quizArea').classList.add('show'); renderQ(); }
function backToEdit(){ document.getElementById('resultArea').classList.remove('show'); document.getElementById('setupArea').style.display=''; renderSetup(); }

renderSetup();
</script>
</body>
</html>
