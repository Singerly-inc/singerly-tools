<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700;900&display=swap" rel="stylesheet">
<title>ランダムペアリング — ムドメわっしょい！</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  min-height:100vh; background:#fff;
  font-family:'DM Sans','Hiragino Sans','Hiragino Kaku Gothic ProN',Arial,sans-serif;
  color:#000000; display:flex; flex-direction:column; align-items:center;
}
.nav { width:100%; padding:12px 28px; background:#000000; display:flex; align-items:center; justify-content:space-between; }
.nav-back { color:rgba(255,255,255,0.55); font-size:0.78rem; text-decoration:none; transition:color 0.15s; }
.nav-back:hover { color:#fff; }
.nav-brand { font-size:0.7rem; color:rgba(255,255,255,0.3); letter-spacing:0.15em; }
.page-header { background:#000000; width:100%; padding:28px 20px 24px; text-align:center; border-bottom:3px solid #B7282E; }
.tool-badge { display:inline-block; background:#B7282E; color:#fff; font-size:0.68rem; letter-spacing:0.15em; padding:3px 12px; border-radius:3px; margin-bottom:10px; font-weight:700; }
.page-title { font-size:1.8rem; font-weight:900; color:#fff; margin-bottom:4px; }
.page-sub { font-size:0.8rem; color:rgba(255,255,255,0.45); }

.main { width:100%; max-width:800px; padding:28px 24px 60px; display:flex; flex-direction:column; gap:20px; }

.input-area { background:#F6F6F6; border:1px solid #E0E0E0; border-radius:10px; padding:24px; }
.area-title { font-size:0.65rem; letter-spacing:0.18em; color:#888; text-transform:uppercase; margin-bottom:12px; font-weight:700; }
.input-area textarea {
  width:100%; background:#fff; border:1px solid #CCCCCC; border-radius:6px;
  padding:12px 14px; color:#000000; font-size:0.9rem; font-family:inherit;
  line-height:1.7; min-height:120px; resize:vertical; outline:none; transition:border-color 0.15s;
}
.input-area textarea:focus { border-color:#B7282E; }
.input-area textarea::placeholder { color:#bbb; }

.btn-row { display:flex; gap:10px; margin-top:14px; }
.btn-primary {
  flex:1; padding:13px; font-size:0.95rem; font-weight:900;
  letter-spacing:0.06em; border:none; border-radius:8px; cursor:pointer;
  background:#B7282E; color:#fff; font-family:inherit;
  transition:background 0.15s, transform 0.12s;
}
.btn-primary:hover { background:#83151B; transform:translateY(-1px); }
.btn-secondary {
  padding:13px 20px; font-size:0.82rem; font-weight:600;
  border:1px solid #CCCCCC; border-radius:8px; cursor:pointer;
  background:#fff; color:#888; font-family:inherit; transition:background 0.15s;
}
.btn-secondary:hover { background:#F6F6F6; }

/* RESULT */
.result-area { display:none; }
.result-area.show { display:block; }
.result-header { font-size:0.68rem; letter-spacing:0.16em; color:#888; text-transform:uppercase; text-align:center; margin-bottom:18px; font-weight:700; }

.pairs-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:14px; }

.pair-card {
  background:#F6F6F6; border:2px solid #E0E0E0; border-radius:10px; padding:18px;
  display:flex; flex-direction:column; gap:10px;
  animation:popIn 0.35s ease both;
}
@keyframes popIn { 0%{opacity:0;transform:scale(0.9)} 70%{transform:scale(1.02)} 100%{opacity:1;transform:scale(1)} }

.pair-num { font-size:0.62rem; font-weight:800; color:#B7282E; letter-spacing:0.14em; text-transform:uppercase; }

.pair-members { display:flex; flex-direction:column; gap:8px; }
.pair-member {
  background:#fff; border:1px solid #E0E0E0; border-radius:6px;
  padding:10px 14px; font-size:0.92rem; font-weight:700; color:#000000;
  display:flex; align-items:center; gap:8px;
}
.pair-member .avatar {
  width:28px; height:28px; background:#B7282E; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  color:#fff; font-size:0.7rem; font-weight:900; flex-shrink:0;
}

.pair-divider { text-align:center; font-size:0.75rem; color:#aaa; letter-spacing:0.1em; }

.trio-badge {
  font-size:0.6rem; background:#FDF3F3; color:#B7282E;
  border:1px solid #DDCCCC; border-radius:3px;
  padding:2px 7px; font-weight:700; align-self:flex-start;
}

.reshuffle-row { text-align:center; margin-top:20px; }
.btn-reshuffle {
  padding:10px 28px; font-size:0.82rem; font-weight:700;
  border:2px solid #B7282E; border-radius:7px; cursor:pointer;
  background:#fff; color:#B7282E; font-family:inherit;
  letter-spacing:0.04em; transition:all 0.15s;
}
.btn-reshuffle:hover { background:#B7282E; color:#fff; }
</style>
<link rel="stylesheet" href="../shared.css">
</head>
<body>

<nav class="nav">
  <a class="nav-back" href="../../">← ムドメわっしょい！</a>
  <span class="nav-brand">SINGERLY</span>
</nav>

<div class="page-header">
  <div class="tool-badge">🤝 チームビルド</div>
  <h1 class="page-title">ランダムペアリング</h1>
  <p class="page-sub">普段話さないメンバーと1on1ペアを自動生成。関係性の質を高める。</p>
</div>

<div class="main">
  <div class="input-area">
    <div class="area-title">参加者リスト</div>
    <textarea id="namesInput" placeholder="名前を1行に1名ずつ入力&#10;&#10;田中 太郎&#10;山田 花子&#10;鈴木 一郎&#10;佐藤 次郎"></textarea>
    <div class="btn-row">
      <button class="btn-primary" onclick="generate()">🤝 ペアを作る！</button>
      <button class="btn-secondary" onclick="reset()">リセット</button>
    </div>
  </div>

  <div class="result-area" id="resultArea">
    <div class="result-header" id="resultHeader"></div>
    <div class="pairs-grid" id="pairsGrid"></div>
    <div class="reshuffle-row">
      <button class="btn-reshuffle" onclick="generate()">🔀 シャッフルし直す</button>
    </div>
  </div>
</div>

<script>
function shuffle(a){ a=[...a]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }

function initials(name){ return name.trim().slice(0,1); }

function generate(){
  const raw=document.getElementById('namesInput').value;
  const names=raw.split(/[\n、,，]+/).map(s=>s.trim()).filter(s=>s);
  if(names.length<2){alert('2名以上入力してください');return;}

  const arr=shuffle(names);
  const pairs=[];
  for(let i=0;i<arr.length;i+=2){
    if(i+1<arr.length){ pairs.push([arr[i],arr[i+1]]); }
    else { pairs[pairs.length-1].push(arr[i]); } // 奇数→最後のペアをトリオに
  }

  const grid=document.getElementById('pairsGrid');
  grid.innerHTML='';
  pairs.forEach((pair,i)=>{
    const delay=i*70;
    const isTrio=pair.length===3;
    const card=document.createElement('div');
    card.className='pair-card';
    card.style.animationDelay=delay+'ms';
    if(isTrio) card.style.borderColor='#B7282E';
    card.innerHTML=`
      <div class="pair-num">Pair ${i+1}${isTrio?' <span class="trio-badge">3名</span>':''}</div>
      <div class="pair-members">
        ${pair.map((name,mi)=>`
          ${mi>0?`<div class="pair-divider">× 1on1</div>`:''}
          <div class="pair-member" style="animation-delay:${delay+mi*60}ms">
            <div class="avatar" style="background:${isTrio?'#B7282E':'#B7282E'}">${initials(name)}</div>
            ${name}
          </div>
        `).join('')}
      </div>`;
    grid.appendChild(card);
  });

  const oddNote=names.length%2===1?' ※奇数のため1組は3名':'';
  document.getElementById('resultHeader').textContent=`${names.length}名 → ${pairs.length}ペア${oddNote}`;
  document.getElementById('resultArea').classList.add('show');
}

function reset(){
  document.getElementById('namesInput').value='';
  document.getElementById('resultArea').classList.remove('show');
}
</script>
</body>
</html>
