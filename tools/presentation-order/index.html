<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700;900&display=swap" rel="stylesheet">
<title>発表順くじ引き — ムドメわっしょい！</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  min-height:100vh; background:#fff;
  font-family:'DM Sans','Hiragino Sans','Hiragino Kaku Gothic ProN',Arial,sans-serif;
  color:#000; display:flex; flex-direction:column; align-items:center;
}
.nav {
  width:100%; padding:12px 28px;
  display:flex; align-items:center; justify-content:space-between;
  background:#000; color:#fff;
}
.nav-back { color:rgba(255,255,255,0.55); font-size:0.78rem; text-decoration:none; letter-spacing:0.04em; transition:color 0.15s; }
.nav-back:hover { color:#fff; }
.nav-brand { font-size:0.7rem; color:rgba(255,255,255,0.3); letter-spacing:0.15em; }
.page-header {
  background:#000; width:100%;
  padding:32px 20px 28px; text-align:center;
  border-bottom:3px solid #B7282E;
}
.tool-badge { display:inline-block; background:#B7282E; color:#fff; font-size:0.68rem; letter-spacing:0.15em; padding:3px 12px; border-radius:3px; margin-bottom:12px; font-weight:700; }
.page-title { font-size:1.8rem; font-weight:900; color:#fff; margin-bottom:4px; }
.page-sub { font-size:0.8rem; color:rgba(255,255,255,0.45); }

.layout {
  display:flex; gap:24px; width:100%; max-width:900px;
  padding:28px 24px 60px; align-items:flex-start;
}
@media(max-width:640px){ .layout{flex-direction:column;} }

/* LEFT PANEL */
.panel { background:#F6F6F6; border:1px solid #E0E0E0; border-radius:10px; padding:22px; flex:1; min-width:200px; }
.panel-title { font-size:0.65rem; letter-spacing:0.18em; color:#888; text-transform:uppercase; margin-bottom:14px; font-weight:700; }
.input-row { display:flex; gap:8px; margin-bottom:12px; }
.input-row input {
  flex:1; background:#fff; border:1px solid #CCCCCC;
  border-radius:6px; padding:9px 12px; color:#000;
  font-size:0.88rem; outline:none; font-family:inherit; transition:border-color 0.15s;
}
.input-row input:focus { border-color:#B7282E; }
.input-row input::placeholder { color:#bbb; }
.btn-add {
  background:#B7282E; border:none; border-radius:6px;
  width:38px; height:38px; cursor:pointer;
  font-size:1.2rem; color:#fff; font-weight:900; flex-shrink:0; transition:background 0.15s;
}
.btn-add:hover { background:#83151B; }
.name-list { list-style:none; max-height:280px; overflow-y:auto; display:flex; flex-direction:column; gap:5px; }
.name-list::-webkit-scrollbar { width:3px; }
.name-list::-webkit-scrollbar-thumb { background:#CCCCCC; border-radius:2px; }
.name-item { display:flex; align-items:center; background:#fff; border:1px solid #EEEEEE; border-radius:6px; padding:7px 10px; font-size:0.85rem; }
.name-num { font-size:0.62rem; color:#bbb; width:16px; flex-shrink:0; }
.name-text { flex:1; padding:0 8px; color:#000; }
.btn-del { background:none; border:none; color:#ccc; cursor:pointer; font-size:0.85rem; transition:color 0.15s; }
.btn-del:hover { color:#e05; }
.count-badge { text-align:right; font-size:0.7rem; color:#aaa; margin-top:8px; }
.bulk-area { margin-top:12px; border-top:1px solid #EEEEEE; padding-top:12px; }
.bulk-area textarea {
  width:100%; background:#fff; border:1px solid #CCCCCC;
  border-radius:6px; padding:9px 12px; color:#000;
  font-size:0.78rem; resize:vertical; min-height:64px;
  outline:none; font-family:inherit; line-height:1.6;
}
.bulk-area textarea:focus { border-color:#B7282E; }
.bulk-area textarea::placeholder { color:#bbb; }
.btn-bulk {
  margin-top:6px; width:100%;
  background:#fff; border:1px solid #CCCCCC;
  border-radius:6px; padding:8px;
  color:#555; font-size:0.78rem; cursor:pointer;
  font-family:inherit; transition:background 0.15s;
}
.btn-bulk:hover { background:#F6F6F6; }
.empty-state { color:#bbb; font-size:0.8rem; text-align:center; padding:14px 0; }

/* RIGHT PANEL */
.result-panel { flex:1.3; display:flex; flex-direction:column; gap:16px; }

.shuffle-box {
  background:#F6F6F6; border:1px solid #E0E0E0;
  border-radius:10px; padding:24px 20px;
  display:flex; flex-direction:column; gap:14px;
}
.btn-shuffle {
  width:100%; padding:14px; font-size:1rem; font-weight:900;
  letter-spacing:0.08em; border:none; border-radius:8px;
  cursor:pointer; background:#B7282E; color:#fff;
  font-family:inherit; transition:background 0.15s, transform 0.12s;
}
.btn-shuffle:hover:not(:disabled) { background:#83151B; transform:translateY(-1px); }
.btn-shuffle:disabled { opacity:0.4; cursor:not-allowed; }
.btn-reset {
  width:100%; padding:9px; font-size:0.8rem; font-weight:600;
  border:1px solid #CCCCCC; border-radius:7px;
  cursor:pointer; background:#fff; color:#888;
  font-family:inherit; transition:background 0.15s;
}
.btn-reset:hover { background:#F6F6F6; }

.result-box {
  background:#F6F6F6; border:1px solid #E0E0E0;
  border-radius:10px; padding:20px;
  display:none; flex-direction:column; gap:12px;
}
.result-box.show { display:flex; }
.result-header { display:flex; align-items:center; justify-content:space-between; }
.result-title { font-size:0.65rem; letter-spacing:0.18em; color:#888; text-transform:uppercase; font-weight:700; }

.action-btns { display:flex; gap:8px; flex-wrap:wrap; }
.btn-copy, .btn-pptx {
  display:flex; align-items:center; gap:5px;
  padding:7px 14px; border-radius:6px; font-size:0.76rem;
  font-weight:700; cursor:pointer; font-family:inherit;
  border:none; transition:background 0.15s, transform 0.1s; letter-spacing:0.04em;
}
.btn-copy { background:#000; color:#fff; }
.btn-copy:hover { background:#333; transform:translateY(-1px); }
.btn-pptx { background:#B7282E; color:#fff; }
.btn-pptx:hover { background:#83151B; transform:translateY(-1px); }
.btn-copy.copied { background:#28a745; }

.order-list {
  list-style:none; display:flex; flex-direction:column; gap:5px;
  max-height:380px; overflow-y:auto;
}
.order-list::-webkit-scrollbar { width:3px; }
.order-list::-webkit-scrollbar-thumb { background:#CCCCCC; border-radius:2px; }
.order-item {
  display:flex; align-items:center; gap:10px;
  background:#fff; border:1px solid #EEEEEE;
  border-radius:6px; padding:8px 12px;
  animation:slideIn 0.25s ease both;
}
.order-item:nth-child(1)  { animation-delay:0.00s }
.order-item:nth-child(2)  { animation-delay:0.03s }
.order-item:nth-child(3)  { animation-delay:0.06s }
.order-item:nth-child(4)  { animation-delay:0.09s }
.order-item:nth-child(5)  { animation-delay:0.12s }
.order-item:nth-child(6)  { animation-delay:0.15s }
.order-item:nth-child(7)  { animation-delay:0.18s }
.order-item:nth-child(8)  { animation-delay:0.20s }
.order-item:nth-child(9)  { animation-delay:0.22s }
.order-item:nth-child(10) { animation-delay:0.24s }
@keyframes slideIn { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:none} }

.order-num {
  min-width:28px; height:28px; border-radius:50%;
  background:#B7282E; color:#fff; font-size:0.72rem;
  font-weight:900; display:flex; align-items:center; justify-content:center;
  flex-shrink:0;
}
.order-num.top3 { background:#000; font-size:0.78rem; }
.order-name { font-size:0.9rem; font-weight:700; color:#000; }

.confetti-container { position:fixed; inset:0; pointer-events:none; z-index:200; overflow:hidden; }
.confetti-piece { position:absolute; animation:fall linear forwards; }
@keyframes fall {
  0%   { transform:translateY(-20px) rotate(0deg); opacity:1; }
  100% { transform:translateY(100vh)  rotate(720deg); opacity:0; }
}
</style>
</head>
<body>

<nav class="nav">
  <a class="nav-back" href="../../index.html">← ムドメわっしょい！</a>
  <span class="nav-brand">SINGERLY</span>
</nav>

<div class="page-header">
  <div class="tool-badge">🎲 アイスブレイク</div>
  <h1 class="page-title">発表順くじ引き</h1>
  <p class="page-sub">プレゼン発表順をランダム決定 — PPTX・コピペ出力対応</p>
</div>

<div class="layout">
  <!-- 左：参加者入力 -->
  <div class="panel">
    <div class="panel-title">参加者リスト</div>
    <div class="input-row">
      <input type="text" id="nameInput" placeholder="名前を入力…" maxlength="30">
      <button class="btn-add" onclick="addName()">＋</button>
    </div>
    <ul class="name-list" id="nameList">
      <li class="empty-state">まだ参加者がいません</li>
    </ul>
    <div class="count-badge" id="countBadge"></div>
    <div class="bulk-area">
      <textarea id="bulkInput" placeholder="一括入力（1行1名 または「、」「,」区切り）"></textarea>
      <button class="btn-bulk" onclick="bulkAdd()">一括追加</button>
    </div>
  </div>

  <!-- 右：結果 -->
  <div class="result-panel">
    <div class="shuffle-box">
      <button class="btn-shuffle" id="shuffleBtn" onclick="doShuffle()" disabled>🎤 順番を決める</button>
      <button class="btn-reset" onclick="resetAll()">リセット</button>
    </div>

    <div class="result-box" id="resultBox">
      <div class="result-header">
        <div class="result-title">発表順</div>
        <div class="action-btns">
          <button class="btn-copy" id="copyBtn" onclick="copyResult()">📋 コピー</button>
          <button class="btn-pptx" onclick="downloadPptx()">📊 PowerPoint</button>
        </div>
      </div>
      <ul class="order-list" id="orderList"></ul>
    </div>
  </div>
</div>

<div class="confetti-container" id="confetti"></div>

<!-- PptxGenJS CDN -->
<script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>

<script>
let names = [], order = [];
const nameInput  = document.getElementById('nameInput');
const nameList   = document.getElementById('nameList');
const countBadge = document.getElementById('countBadge');
const shuffleBtn = document.getElementById('shuffleBtn');
const resultBox  = document.getElementById('resultBox');
const orderList  = document.getElementById('orderList');

nameInput.addEventListener('keydown', e => { if(e.key === 'Enter') addName(); });

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function addName(n) {
  const v = (n || nameInput.value).trim();
  if (!v) return;
  if (names.length >= 100) { alert('参加者は最大100名です'); return; }
  names.push(v);
  if (!n) nameInput.value = '';
  nameInput.focus();
  renderList();
}

function removeName(i) { names.splice(i, 1); renderList(); }

function renderList() {
  if (!names.length) {
    nameList.innerHTML = '<li class="empty-state">まだ参加者がいません</li>';
    countBadge.textContent = '';
    shuffleBtn.disabled = true;
    return;
  }
  nameList.innerHTML = names.map((n, i) =>
    `<li class="name-item">
      <span class="name-num">${i+1}</span>
      <span class="name-text">${esc(n)}</span>
      <button class="btn-del" onclick="removeName(${i})">✕</button>
    </li>`
  ).join('');
  countBadge.textContent = names.length + ' 名';
  shuffleBtn.disabled = names.length < 2;
}

function bulkAdd() {
  const raw = document.getElementById('bulkInput').value;
  raw.split(/[\n、,，]+/).map(s => s.trim()).filter(s => s).forEach(p => addName(p));
  document.getElementById('bulkInput').value = '';
}

function shuffleArray(a) {
  a = [...a];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function doShuffle() {
  if (names.length < 2) return;
  order = shuffleArray(names);
  renderOrder();
  launchConfetti();
}

function renderOrder() {
  orderList.innerHTML = order.map((n, i) =>
    `<li class="order-item">
      <div class="order-num ${i < 3 ? 'top3' : ''}">${i + 1}</div>
      <div class="order-name">${esc(n)}</div>
    </li>`
  ).join('');
  resultBox.classList.add('show');
}

function copyResult() {
  if (!order.length) return;
  const text = '順番\t名前\n' + order.map((n, i) => `${i+1}\t${n}`).join('\n');
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = '✅ コピー完了';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '📋 コピー'; btn.classList.remove('copied'); }, 2000);
  });
}

function downloadPptx() {
  if (!order.length) return;

  const pres = new PptxGenJS();
  pres.layout = 'LAYOUT_16x9';

  const slide = pres.addSlide();

  // 背景
  slide.background = { color: '000000' };

  // ヘッダー帯（茜色）
  slide.addShape(pres.ShapeType.rect, {
    x: 0, y: 0, w: '100%', h: 0.72,
    fill: { color: 'B7282E' }
  });

  // タイトル
  slide.addText('発表順', {
    x: 0.3, y: 0.04, w: 9.4, h: 0.6,
    fontSize: 22, bold: true, color: 'FFFFFF',
    fontFace: 'Arial', valign: 'middle'
  });

  // 人数バッジ
  slide.addText(`${order.length}名`, {
    x: 8.8, y: 0.04, w: 1.2, h: 0.6,
    fontSize: 14, bold: true, color: 'FFFFFF',
    fontFace: 'Arial', valign: 'middle', align: 'right'
  });

  const total = order.length;
  const cols = total <= 20 ? 1 : total <= 50 ? 2 : 3;
  const perCol = Math.ceil(total / cols);
  const colW = cols === 1 ? 9.4 : cols === 2 ? 4.5 : 2.9;
  const startX = cols === 1 ? 0.3 : 0.2;
  const startY = 0.9;
  const availH = 6.2;
  const rowH = Math.min(availH / perCol, 0.36);
  const fontSize = rowH >= 0.3 ? 13 : rowH >= 0.22 ? 11 : 9;

  for (let c = 0; c < cols; c++) {
    const xPos = startX + c * (colW + 0.2);
    for (let r = 0; r < perCol; r++) {
      const idx = c * perCol + r;
      if (idx >= total) break;
      const name = order[idx];
      const yPos = startY + r * rowH;
      const isTop3 = idx < 3;

      // 番号
      slide.addText(String(idx + 1), {
        x: xPos, y: yPos, w: 0.45, h: rowH,
        fontSize: fontSize - 1,
        bold: true,
        color: isTop3 ? 'B7282E' : '888888',
        fontFace: 'Arial', valign: 'middle', align: 'right'
      });

      // 名前
      slide.addText(name, {
        x: xPos + 0.5, y: yPos, w: colW - 0.55, h: rowH,
        fontSize: fontSize,
        bold: isTop3,
        color: isTop3 ? 'FFFFFF' : 'CCCCCC',
        fontFace: 'Arial', valign: 'middle'
      });

      // 区切り線（最後の行以外）
      if (r < perCol - 1 && idx + 1 < total) {
        slide.addShape(pres.ShapeType.line, {
          x: xPos, y: yPos + rowH - 0.01,
          w: colW, h: 0,
          line: { color: '333333', width: 0.5 }
        });
      }
    }
  }

  // フッター
  slide.addText('ムドメわっしょい！by Singerly', {
    x: 0, y: 7.0, w: '100%', h: 0.3,
    fontSize: 8, color: '444444',
    fontFace: 'Arial', align: 'center', valign: 'middle'
  });

  pres.writeFile({ fileName: '発表順.pptx' });
}

function resetAll() {
  names = []; order = [];
  renderList();
  resultBox.classList.remove('show');
  orderList.innerHTML = '';
}

const COLORS = ['#B7282E','#83151B','#000000','#D4756E','#E8A9A9','#CCCCCC'];
function launchConfetti() {
  const confetti = document.getElementById('confetti');
  confetti.innerHTML = '';
  for (let i = 0; i < 60; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.left = Math.random() * 100 + 'vw';
    el.style.background = COLORS[Math.floor(Math.random() * COLORS.length)];
    el.style.width  = (5 + Math.random() * 7) + 'px';
    el.style.height = (5 + Math.random() * 7) + 'px';
    el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    el.style.animation = `fall ${1.4 + Math.random() * 2}s ${Math.random() * 0.6}s ease-in forwards`;
    confetti.appendChild(el);
  }
  setTimeout(() => { confetti.innerHTML = ''; }, 4000);
}
</script>
</body>
</html>
