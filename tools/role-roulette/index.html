<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700;900&display=swap" rel="stylesheet">
<title>役割ルーレット — ムドメわっしょい！</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { min-height:100vh; background:#fff; font-family:'DM Sans','Hiragino Sans','Hiragino Kaku Gothic ProN',Arial,sans-serif; color:#000000; display:flex; flex-direction:column; align-items:center; }
.nav { width:100%; padding:12px 28px; background:#000000; display:flex; align-items:center; justify-content:space-between; }
.nav-back { color:rgba(255,255,255,0.55); font-size:0.78rem; text-decoration:none; transition:color 0.15s; }
.nav-back:hover { color:#fff; }
.nav-brand { font-size:0.7rem; color:rgba(255,255,255,0.3); letter-spacing:0.15em; }
.page-header { background:#000000; width:100%; padding:28px 20px 24px; text-align:center; border-bottom:3px solid #B7282E; }
.tool-badge { display:inline-block; background:#B7282E; color:#fff; font-size:0.68rem; letter-spacing:0.15em; padding:3px 12px; border-radius:3px; margin-bottom:10px; font-weight:700; }
.page-title { font-size:1.8rem; font-weight:900; color:#fff; margin-bottom:4px; }
.page-sub { font-size:0.8rem; color:rgba(255,255,255,0.45); }

.main { width:100%; max-width:800px; padding:28px 24px 60px; display:flex; flex-direction:column; gap:20px; }

.setup-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
@media(max-width:600px){ .setup-grid{grid-template-columns:1fr;} }

.panel { background:#F6F6F6; border:1px solid #E0E0E0; border-radius:10px; padding:22px; }
.area-title { font-size:0.65rem; letter-spacing:0.18em; color:#888; text-transform:uppercase; margin-bottom:12px; font-weight:700; }
.panel textarea {
  width:100%; background:#fff; border:1px solid #CCCCCC; border-radius:6px;
  padding:10px 12px; color:#000000; font-size:0.88rem; font-family:inherit;
  line-height:1.7; min-height:140px; resize:vertical; outline:none; transition:border-color 0.15s;
}
.panel textarea:focus { border-color:#B7282E; }
.panel textarea::placeholder { color:#bbb; }
.panel-hint { font-size:0.68rem; color:#aaa; margin-top:6px; line-height:1.5; }

.btn-primary { width:100%; padding:13px; font-size:0.95rem; font-weight:900; border:none; border-radius:8px; cursor:pointer; background:#B7282E; color:#fff; font-family:inherit; transition:background 0.15s; }
.btn-primary:hover { background:#83151B; }

/* RESULT */
.result-area { display:none; }
.result-area.show { display:block; }
.result-header { font-size:0.65rem; letter-spacing:0.18em; color:#888; text-transform:uppercase; text-align:center; margin-bottom:18px; font-weight:700; }

.role-cards { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:14px; }
.role-card {
  background:#fff; border:2px solid #E0E0E0; border-radius:10px; padding:18px 16px;
  text-align:center; animation:popIn 0.35s ease both;
}
@keyframes popIn { 0%{opacity:0;transform:scale(0.88)} 70%{transform:scale(1.03)} 100%{opacity:1;transform:scale(1)} }
.role-icon { font-size:1.8rem; margin-bottom:8px; }
.role-name { font-size:0.72rem; font-weight:900; color:#B7282E; letter-spacing:0.08em; text-transform:uppercase; margin-bottom:6px; }
.role-person { font-size:1.1rem; font-weight:800; color:#000000; }
.role-desc { font-size:0.68rem; color:#888; margin-top:4px; line-height:1.4; }

.btn-row { display:flex; gap:10px; margin-top:4px; }
.btn-reshuffle { flex:1; padding:11px; font-size:0.85rem; font-weight:700; border:2px solid #B7282E; border-radius:7px; cursor:pointer; background:#fff; color:#B7282E; font-family:inherit; transition:all 0.15s; }
.btn-reshuffle:hover { background:#B7282E; color:#fff; }
.btn-reset { padding:11px 18px; font-size:0.82rem; font-weight:600; border:1px solid #CCCCCC; border-radius:7px; cursor:pointer; background:#fff; color:#888; font-family:inherit; transition:background 0.15s; }
.btn-reset:hover { background:#F6F6F6; }
</style>
<link rel="stylesheet" href="../shared.css">
</head>
<body>
<nav class="nav"><a class="nav-back" href="../../">← ムドメわっしょい！</a><span class="nav-brand">SINGERLY</span></nav>
<div class="page-header">
  <div class="tool-badge">🎭 チームビルド</div>
  <h1 class="page-title">役割ルーレット</h1>
  <p class="page-sub">会議・ワークの役割をランダムに割り当て。固定化を防ぐ。</p>
</div>
<div class="main">
  <div class="setup-grid">
    <div class="panel">
      <div class="area-title">参加者</div>
      <textarea id="namesInput" placeholder="田中 太郎&#10;山田 花子&#10;鈴木 一郎&#10;佐藤 次郎"></textarea>
    </div>
    <div class="panel">
      <div class="area-title">役割リスト</div>
      <textarea id="rolesInput" placeholder="ファシリテーター&#10;タイムキーパー&#10;書記&#10;アイスブレイカー">ファシリテーター
タイムキーパー
書記
アイスブレイカー</textarea>
      <p class="panel-hint">※ 参加者数より役割が少ない場合、余った人は「サポーター」になります</p>
    </div>
  </div>
  <button class="btn-primary" onclick="assign()">🎭 役割を決める！</button>

  <div class="result-area" id="resultArea">
    <div class="result-header" id="resultHeader"></div>
    <div class="role-cards" id="roleCards"></div>
    <div class="btn-row" style="margin-top:16px;">
      <button class="btn-reshuffle" onclick="assign()">🔀 シャッフルし直す</button>
      <button class="btn-reset" onclick="reset()">リセット</button>
    </div>
  </div>
</div>
<script>
const ROLE_ICONS = { 'ファシリテーター':'🎤','タイムキーパー':'⏱️','書記':'📝','アイスブレイカー':'🎲','サポーター':'🤝' };
const ROLE_DESCS = { 'ファシリテーター':'場を進行し、全員が発言しやすい環境を作る','タイムキーパー':'時間を管理し、スケジュール通りに進める','書記':'議論の内容を記録し、共有する','アイスブレイカー':'場を温め、全員が参加しやすい雰囲気を作る','サポーター':'全体をサポートし、場の質を高める' };

function shuffle(a){a=[...a];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function assign(){
  const names=document.getElementById('namesInput').value.split(/[\n、,，]+/).map(s=>s.trim()).filter(s=>s);
  const roles=document.getElementById('rolesInput').value.split(/[\n、,，]+/).map(s=>s.trim()).filter(s=>s);
  if(!names.length){alert('参加者を入力してください');return;}
  if(!roles.length){alert('役割を入力してください');return;}

  const sNames=shuffle(names);
  const sRoles=shuffle(roles);
  const assignments=sNames.map((name,i)=>({ name, role:sRoles[i]||'サポーター' }));

  document.getElementById('roleCards').innerHTML=assignments.map((a,i)=>{
    const icon=ROLE_ICONS[a.role]||'⭐';
    const desc=ROLE_DESCS[a.role]||'チームを支えるサポート役';
    return `<div class="role-card" style="animation-delay:${i*60}ms;border-color:${i===0?'#B7282E':'#E0E0E0'}">
      <div class="role-icon">${icon}</div>
      <div class="role-name">${a.role}</div>
      <div class="role-person">${a.name}</div>
      <div class="role-desc">${desc}</div>
    </div>`;
  }).join('');

  document.getElementById('resultHeader').textContent=`${names.length}名に役割を割り当てました`;
  document.getElementById('resultArea').classList.add('show');
}
function reset(){ document.getElementById('resultArea').classList.remove('show'); }
</script>
</body>
</html>
