<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700;900&display=swap" rel="stylesheet">
<title>意外な一面カミングアウト — ムドメわっしょい！</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { min-height:100vh; background:#fff; font-family:'DM Sans','Hiragino Sans','Hiragino Kaku Gothic ProN',Arial,sans-serif; color:#000000; display:flex; flex-direction:column; align-items:center; }
.nav { width:100%; padding:12px 28px; background:#000000; display:flex; align-items:center; justify-content:space-between; }
.nav-back { color:rgba(255,255,255,0.55); font-size:0.78rem; text-decoration:none; transition:color 0.15s; }
.nav-back:hover { color:#fff; }
.nav-brand { font-size:0.7rem; color:rgba(255,255,255,0.3); letter-spacing:0.15em; }
.page-header { background:#000000; width:100%; padding:28px 20px 24px; text-align:center; border-bottom:3px solid #B7282E; }
.tool-badge { display:inline-block; background:#B7282E; color:#fff; font-size:0.68rem; letter-spacing:0.15em; padding:3px 12px; border-radius:3px; margin-bottom:10px; font-weight:700; }
.page-title { font-size:1.8rem; font-weight:900; color:#fff; margin-bottom:4px; }
.page-sub { font-size:0.8rem; color:rgba(255,255,255,0.45); }

.main { width:100%; max-width:720px; padding:28px 24px 60px; display:flex; flex-direction:column; gap:20px; }

.input-area { background:#F6F6F6; border:1px solid #E0E0E0; border-radius:10px; padding:24px; }
.area-title { font-size:0.65rem; letter-spacing:0.18em; color:#888; text-transform:uppercase; margin-bottom:14px; font-weight:700; }
.field { margin-bottom:12px; }
.field label { display:block; font-size:0.75rem; font-weight:700; color:#555; margin-bottom:5px; }
.field input {
  width:100%; background:#fff; border:1px solid #CCCCCC; border-radius:6px;
  padding:10px 14px; color:#000000; font-size:0.9rem; font-family:inherit;
  outline:none; transition:border-color 0.15s;
}
.field input:focus { border-color:#B7282E; }
.field input::placeholder { color:#bbb; }
.prefix { font-size:1rem; font-weight:900; color:#B7282E; margin-bottom:6px; display:block; }

.btn-primary { width:100%; padding:13px; font-size:0.95rem; font-weight:900; border:none; border-radius:8px; cursor:pointer; background:#B7282E; color:#fff; font-family:inherit; transition:background 0.15s; }
.btn-primary:hover { background:#83151B; }

/* BOARD */
.board-area { display:none; }
.board-area.show { display:block; }
.board-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
.board-title { font-size:0.65rem; letter-spacing:0.18em; color:#888; text-transform:uppercase; font-weight:700; }
.btn-clear { font-size:0.72rem; color:#aaa; background:none; border:none; cursor:pointer; }
.btn-clear:hover { color:#e05; }

.cards-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:14px; }

.fact-card {
  background:#fff; border:2px solid #E0E0E0; border-radius:10px; padding:20px 16px;
  animation:popIn 0.35s ease both; position:relative; overflow:hidden;
}
@keyframes popIn { 0%{opacity:0;transform:scale(0.88) translateY(8px)} 70%{transform:scale(1.02)} 100%{opacity:1;transform:scale(1)} }
.fact-card::before { content:'😲'; position:absolute; right:12px; top:10px; font-size:1.4rem; opacity:0.15; }

.fact-name { font-size:0.72rem; font-weight:800; color:#B7282E; letter-spacing:0.08em; margin-bottom:8px; text-transform:uppercase; }
.fact-text { font-size:0.95rem; font-weight:700; color:#000000; line-height:1.55; }
.fact-prefix { color:#888; font-weight:400; }

.hee-row { display:flex; align-items:center; gap:8px; margin-top:14px; border-top:1px solid #F6F6F6; padding-top:10px; }
.btn-hee { background:#FDF3F3; border:1px solid #DDCCCC; border-radius:6px; padding:5px 12px; font-size:0.8rem; font-weight:700; color:#B7282E; cursor:pointer; transition:all 0.15s; font-family:inherit; }
.btn-hee:hover { background:#B7282E; color:#fff; }
.hee-count { font-size:0.78rem; color:#aaa; }
</style>
</head>
<body>
<nav class="nav"><a class="nav-back" href="../../">← ムドメわっしょい！</a><span class="nav-brand">SINGERLY</span></nav>
<div class="page-header">
  <div class="tool-badge">😲 アイスブレイク</div>
  <h1 class="page-title">意外な一面カミングアウト</h1>
  <p class="page-sub">「実は〇〇です」を全員がシェア。驚きと親近感が生まれる。</p>
</div>
<div class="main">
  <div class="input-area">
    <div class="area-title">あなたの「意外な一面」を登録</div>
    <div class="field"><label>名前</label><input type="text" id="nameInput" placeholder="田中 太郎"></div>
    <div class="field">
      <label>意外な一面</label>
      <span class="prefix">実は…</span>
      <input type="text" id="factInput" placeholder="元バンドマンです / 猫を3匹飼っています">
    </div>
    <button class="btn-primary" onclick="submit()">カードを追加 →</button>
  </div>
  <div class="board-area" id="boardArea">
    <div class="board-header">
      <div class="board-title">カミングアウトボード</div>
      <button class="btn-clear" onclick="clearAll()">全クリア</button>
    </div>
    <div class="cards-grid" id="cardsGrid"></div>
  </div>
</div>
<script>
let entries=[];
function submit(){
  const name=document.getElementById('nameInput').value.trim();
  const fact=document.getElementById('factInput').value.trim();
  if(!name||!fact){alert('名前と意外な一面を入力してください');return;}
  entries.unshift({name,fact,hee:0});
  document.getElementById('nameInput').value='';
  document.getElementById('factInput').value='';
  document.getElementById('nameInput').focus();
  render();
  document.getElementById('boardArea').classList.add('show');
}
function hee(i){ entries[i].hee++; render(); }
function render(){
  document.getElementById('cardsGrid').innerHTML=entries.map((e,i)=>`
    <div class="fact-card">
      <div class="fact-name">${e.name}</div>
      <div class="fact-text"><span class="fact-prefix">実は…</span> ${e.fact}</div>
      <div class="hee-row">
        <button class="btn-hee" onclick="hee(${i})">へー！</button>
        <span class="hee-count">${e.hee>0?'×'+e.hee:''}</span>
      </div>
    </div>`).join('');
}
function clearAll(){if(confirm('全員分をクリアしますか？')){entries=[];document.getElementById('boardArea').classList.remove('show');}}
document.getElementById('factInput').addEventListener('keydown',e=>{if(e.key==='Enter')submit();});
</script>
</body>
</html>
