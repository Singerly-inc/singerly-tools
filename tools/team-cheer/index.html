<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700;900&display=swap" rel="stylesheet">
<title>チームエール — ムドメわっしょい！</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { min-height:100vh; background:#fff; font-family:'DM Sans','Hiragino Sans','Hiragino Kaku Gothic ProN',Arial,sans-serif; color:#000; display:flex; flex-direction:column; align-items:center; }
.nav { width:100%; padding:12px 28px; background:#000; display:flex; align-items:center; justify-content:space-between; }
.nav-back { color:rgba(255,255,255,0.55); font-size:0.78rem; text-decoration:none; transition:color 0.15s; }
.nav-back:hover { color:#fff; }
.nav-brand { font-size:0.7rem; color:rgba(255,255,255,0.3); letter-spacing:0.15em; }
.page-header { background:#000; width:100%; padding:28px 20px 24px; text-align:center; border-bottom:3px solid #B7282E; }
.tool-badge { display:inline-block; background:#B7282E; color:#fff; font-size:0.68rem; letter-spacing:0.15em; padding:3px 12px; border-radius:3px; margin-bottom:10px; font-weight:700; }
.page-title { font-size:1.8rem; font-weight:900; color:#fff; margin-bottom:4px; }
.page-sub { font-size:0.8rem; color:rgba(255,255,255,0.45); }
.main { width:100%; max-width:680px; padding:28px 24px 60px; display:flex; flex-direction:column; gap:20px; }
.area-title { font-size:0.65rem; letter-spacing:0.18em; color:#888; text-transform:uppercase; margin-bottom:12px; font-weight:700; }
.panel { background:#F6F6F6; border:1px solid #E0E0E0; border-radius:10px; padding:22px; }
.field label { display:block; font-size:0.75rem; font-weight:700; color:#555; margin-bottom:5px; }
.field input { width:100%; background:#fff; border:1px solid #CCCCCC; border-radius:6px; padding:10px 14px; color:#000; font-size:0.9rem; font-family:inherit; outline:none; transition:border-color 0.15s; }
.field input:focus { border-color:#B7282E; }
.field input::placeholder { color:#bbb; }
.field { margin-bottom:12px; }
.btn-primary { width:100%; padding:13px; font-size:0.95rem; font-weight:900; border:none; border-radius:8px; cursor:pointer; background:#B7282E; color:#fff; font-family:inherit; transition:background 0.15s; }
.btn-primary:hover { background:#83151B; }
/* BOARD */
.board-area { display:none; }
.board-area.show { display:flex; flex-direction:column; gap:16px; }
.target-banner { background:#000; border-radius:12px; padding:24px; text-align:center; }
.tb-label { font-size:0.62rem; letter-spacing:0.18em; color:rgba(255,255,255,0.4); text-transform:uppercase; margin-bottom:6px; }
.tb-name { font-size:1.6rem; font-weight:900; color:#fff; }
.tb-theme { font-size:0.88rem; color:#B7282E; margin-top:6px; }
.yell-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:12px; }
.yell-card { background:#fff; border:2px solid #E0E0E0; border-radius:10px; padding:18px 16px; animation:popIn 0.35s ease both; }
@keyframes popIn { 0%{opacity:0;transform:scale(0.88)} 70%{transform:scale(1.03)} 100%{opacity:1;transform:scale(1)} }
.yc-from { font-size:0.65rem; font-weight:700; color:#B7282E; letter-spacing:0.08em; text-transform:uppercase; margin-bottom:6px; }
.yc-msg { font-size:0.95rem; font-weight:700; color:#000; line-height:1.55; }
.input-row { display:flex; gap:10px; }
.input-row input { flex:1; background:#fff; border:1px solid #CCCCCC; border-radius:6px; padding:10px 12px; color:#000; font-size:0.88rem; font-family:inherit; outline:none; transition:border-color 0.15s; }
.input-row input:focus { border-color:#B7282E; }
.input-row input::placeholder { color:#bbb; }
.btn-add { padding:10px 20px; font-size:0.88rem; font-weight:700; border:none; border-radius:6px; cursor:pointer; background:#B7282E; color:#fff; font-family:inherit; white-space:nowrap; }
.btn-add:hover { background:#83151B; }
.btn-row { display:flex; gap:10px; }
.btn-new { flex:1; padding:12px; font-size:0.9rem; font-weight:800; border:none; border-radius:8px; cursor:pointer; background:#B7282E; color:#fff; font-family:inherit; }
.btn-new:hover { background:#83151B; }
.btn-reset { padding:12px 16px; font-size:0.82rem; border:1px solid #CCCCCC; border-radius:8px; cursor:pointer; background:#fff; color:#888; font-family:inherit; }
.btn-reset:hover { background:#F6F6F6; }
</style>
<link rel="stylesheet" href="../shared.css">
</head>
<body>
<nav class="nav"><a class="nav-back" href="../../">← ムドメわっしょい！</a><span class="nav-brand">SINGERLY</span></nav>
<div class="page-header">
  <div class="tool-badge">🎲 アイスブレイク</div>
  <h1 class="page-title">チームエール</h1>
  <p class="page-sub">頑張る仲間に全員でエールを送る。感謝と応援の場を作る。</p>
</div>
<div class="main">
  <div class="panel" id="setupPanel">
    <div class="area-title">エールを送る相手と場面</div>
    <div class="field"><label>エールを送る人</label><input type="text" id="targetName" placeholder="田中 太郎"></div>
    <div class="field"><label>頑張っていること・テーマ</label><input type="text" id="theme" placeholder="プロジェクトのリーダーを引き受けてくれた"></div>
    <button class="btn-primary" onclick="startYell()">📣 エールボードを開く</button>
  </div>
  <div class="board-area" id="board">
    <div class="target-banner">
      <div class="tb-label">エールを送る相手</div>
      <div class="tb-name" id="tbName"></div>
      <div class="tb-theme" id="tbTheme"></div>
    </div>
    <div class="panel" style="padding:16px">
      <div class="area-title">エールを書く</div>
      <div class="input-row">
        <input type="text" id="yellFrom" placeholder="送り主の名前">
        <input type="text" id="yellMsg" placeholder="応援メッセージを一言！">
        <button class="btn-add" onclick="addYell()">送る！</button>
      </div>
    </div>
    <div class="yell-grid" id="yellGrid"></div>
    <div class="btn-row">
      <button class="btn-new" onclick="newBoard()">＋ 新しいエールボード</button>
      <button class="btn-reset" onclick="clearYells()">クリア</button>
    </div>
  </div>
</div>
<script>
let yells=[];
function startYell(){
  const name=document.getElementById('targetName').value.trim();
  const theme=document.getElementById('theme').value.trim();
  if(!name){alert('エールを送る人の名前を入力してください');return;}
  document.getElementById('tbName').textContent=name+' さんへ';
  document.getElementById('tbTheme').textContent='「'+theme+'」';
  document.getElementById('setupPanel').style.display='none';
  document.getElementById('board').classList.add('show');
  yells=[];render();
}
function addYell(){
  const from=document.getElementById('yellFrom').value.trim();
  const msg=document.getElementById('yellMsg').value.trim();
  if(!from||!msg){alert('名前とメッセージを入力してください');return;}
  yells.unshift({from,msg});
  document.getElementById('yellFrom').value='';
  document.getElementById('yellMsg').value='';
  document.getElementById('yellFrom').focus();
  render();
}
function render(){
  document.getElementById('yellGrid').innerHTML=yells.map((y,i)=>
    `<div class="yell-card" style="animation-delay:${i*40}ms">
      <div class="yc-from">${y.from}</div>
      <div class="yc-msg">${y.msg}</div>
    </div>`
  ).join('');
}
function clearYells(){yells=[];render();}
function newBoard(){
  document.getElementById('board').classList.remove('show');
  document.getElementById('setupPanel').style.display='';
  document.getElementById('targetName').value='';
  document.getElementById('theme').value='';
}
document.addEventListener('keydown',e=>{if(e.key==='Enter'&&document.activeElement.id==='yellMsg')addYell();});
</script>
</body>
</html>
