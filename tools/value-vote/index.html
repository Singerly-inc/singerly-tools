<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700;900&display=swap" rel="stylesheet">
<title>バリュー体現投票 — ムドメわっしょい！</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { min-height:100vh; background:#fff; font-family:'DM Sans','Hiragino Sans','Hiragino Kaku Gothic ProN',Arial,sans-serif; color:#000; display:flex; flex-direction:column; align-items:center; }
.nav { width:100%; padding:12px 28px; background:#000; display:flex; align-items:center; justify-content:space-between; }
.nav-back { color:rgba(255,255,255,0.55); font-size:0.78rem; text-decoration:none; transition:color 0.15s; }
.nav-back:hover { color:#fff; }
.nav-brand { font-size:0.7rem; color:rgba(255,255,255,0.3); letter-spacing:0.15em; }
.page-header { background:#000; width:100%; padding:28px 20px 24px; text-align:center; border-bottom:3px solid #B7282E; }
.tool-badge { display:inline-block; background:#B7282E; color:#fff; font-size:0.68rem; letter-spacing:0.15em; padding:3px 12px; border-radius:3px; margin-bottom:10px; font-weight:700; }
.page-title { font-size:1.8rem; font-weight:900; color:#fff; margin-bottom:4px; }
.page-sub { font-size:0.8rem; color:rgba(255,255,255,0.45); }
.main { width:100%; max-width:720px; padding:28px 24px 60px; display:flex; flex-direction:column; gap:20px; }
.area-title { font-size:0.65rem; letter-spacing:0.18em; color:#888; text-transform:uppercase; margin-bottom:12px; font-weight:700; }
.panel { background:#F6F6F6; border:1px solid #E0E0E0; border-radius:10px; padding:22px; }
.panel textarea { width:100%; background:#fff; border:1px solid #CCCCCC; border-radius:6px; padding:10px 12px; font-family:inherit; font-size:0.88rem; color:#000; min-height:80px; resize:vertical; outline:none; transition:border-color 0.15s; line-height:1.7; }
.panel textarea:focus { border-color:#B7282E; }
.panel textarea::placeholder { color:#bbb; }
.field label { display:block; font-size:0.72rem; font-weight:700; color:#555; margin-bottom:5px; }
.field { margin-bottom:12px; }
.btn-primary { width:100%; padding:13px; font-size:0.95rem; font-weight:900; border:none; border-radius:8px; cursor:pointer; background:#B7282E; color:#fff; font-family:inherit; transition:background 0.15s; }
.btn-primary:hover { background:#83151B; }
/* VOTE */
.vote-area { display:none; }
.vote-area.show { display:flex; flex-direction:column; gap:16px; }
.value-section { background:#fff; border:1px solid #E0E0E0; border-radius:10px; overflow:hidden; }
.vs-header { background:#000; padding:14px 20px; }
.vs-value { font-size:1rem; font-weight:900; color:#fff; }
.vs-question { font-size:0.72rem; color:rgba(255,255,255,0.5); margin-top:2px; }
.vs-members { padding:14px 20px; display:flex; flex-direction:column; gap:8px; }
.member-row { display:flex; align-items:center; gap:12px; }
.member-name { font-size:0.9rem; font-weight:700; flex:1; }
.vote-count-display { font-size:1.1rem; font-weight:900; color:#B7282E; width:28px; text-align:right; }
.bar-bg { flex:2; background:#EEEEEE; border-radius:3px; height:8px; overflow:hidden; }
.bar-fill { height:100%; background:#B7282E; border-radius:3px; transition:width 0.4s ease; }
.btn-vote { padding:6px 14px; border:2px solid #E0E0E0; border-radius:6px; background:#fff; font-size:0.78rem; font-weight:700; color:#555; cursor:pointer; font-family:inherit; transition:all 0.15s; white-space:nowrap; }
.btn-vote:hover { border-color:#B7282E; color:#B7282E; }
.btn-row { display:flex; gap:10px; }
.btn-new { flex:1; padding:12px; font-size:0.9rem; font-weight:800; border:none; border-radius:8px; cursor:pointer; background:#B7282E; color:#fff; font-family:inherit; }
.btn-new:hover { background:#83151B; }
.btn-reset { padding:12px 16px; font-size:0.82rem; border:1px solid #CCCCCC; border-radius:8px; cursor:pointer; background:#fff; color:#888; font-family:inherit; }
.btn-reset:hover { background:#F6F6F6; }
</style>
<link rel="stylesheet" href="../shared.css">
</head>
<body>
<nav class="nav"><a class="nav-back" href="../../">← ムドメわっしょい！</a><span class="nav-brand">SINGERLY</span></nav>
<div class="page-header">
  <div class="tool-badge">🧩 理念・文化</div>
  <h1 class="page-title">バリュー体現投票</h1>
  <p class="page-sub">「このバリューを体現している人は誰？」チームで投票して称え合う。</p>
</div>
<div class="main">
  <div class="panel" id="setupPanel">
    <div class="area-title">設定</div>
    <div class="field"><label>バリュー（1行1個）</label><textarea id="valuesIn" placeholder="誠実に行動する&#10;挑戦を恐れない&#10;チームを大切にする">誠実に行動する
挑戦を恐れない
チームを大切にする</textarea></div>
    <div class="field"><label>メンバー名（1行1人）</label><textarea id="membersIn" placeholder="田中 太郎&#10;山田 花子&#10;鈴木 一郎"></textarea></div>
    <button class="btn-primary" onclick="startVote()">▶ 投票スタート</button>
  </div>
  <div class="vote-area" id="voteArea">
    <div id="valueSections"></div>
    <div class="btn-row">
      <button class="btn-new" onclick="reset()">← 最初から</button>
      <button class="btn-reset" onclick="resetVotes()">票をリセット</button>
    </div>
  </div>
</div>
<script>
let data=[];
function startVote(){
  const values=document.getElementById('valuesIn').value.split('\n').map(s=>s.trim()).filter(s=>s);
  const members=document.getElementById('membersIn').value.split('\n').map(s=>s.trim()).filter(s=>s);
  if(!values.length||members.length<2){alert('バリューとメンバーを入力してください');return;}
  data=values.map(v=>({value:v,votes:Object.fromEntries(members.map(m=>[m,0]))}));
  render();
  document.getElementById('setupPanel').style.display='none';
  document.getElementById('voteArea').classList.add('show');
}
function vote(vi,member){
  data[vi].votes[member]++;
  render();
}
function render(){
  document.getElementById('valueSections').innerHTML=data.map((d,vi)=>{
    const max=Math.max(...Object.values(d.votes),1);
    return `<div class="value-section">
      <div class="vs-header"><div class="vs-value">${d.value}</div><div class="vs-question">このバリューを体現している人は？</div></div>
      <div class="vs-members">${Object.entries(d.votes).map(([m,c])=>`
        <div class="member-row">
          <span class="member-name">${m}</span>
          <div class="bar-bg"><div class="bar-fill" style="width:${c/max*100}%"></div></div>
          <span class="vote-count-display">${c}</span>
          <button class="btn-vote" onclick="vote(${vi},'${m}')">投票</button>
        </div>`).join('')}
      </div>
    </div>`;
  }).join('');
}
function resetVotes(){data.forEach(d=>{Object.keys(d.votes).forEach(m=>d.votes[m]=0);});render();}
function reset(){
  document.getElementById('voteArea').classList.remove('show');
  document.getElementById('setupPanel').style.display='';
}
</script>
</body>
</html>
